    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#888" />
    </marker>
  </defs>
  <rect width="420" height="120" rx="18" fill="#fafdff"/>
  <g font-family="Segoe UI, Arial" font-size="14">
    <g filter="url(#shadow)">
      <rect x="20" y="40" width="60" height="40" rx="10" fill="url(#dl1)"/>
      <text x="50" y="65" text-anchor="middle" fill="#4e1a7a" font-weight="bold">Wejście</text>
      <rect x="90" y="40" width="70" height="40" rx="10" fill="url(#l1)"/>
      <text x="125" y="65" text-anchor="middle" fill="#1a355e" font-weight="bold">Warstwa 1</text>
      <rect x="170" y="40" width="70" height="40" rx="10" fill="url(#l2)"/>
      <text x="205" y="65" text-anchor="middle" fill="#1a3e2b" font-weight="bold">Warstwa 2</text>
      <rect x="250" y="40" width="70" height="40" rx="10" fill="url(#l1)"/>
      <text x="285" y="65" text-anchor="middle" fill="#1a355e" font-weight="bold">Warstwa 3</text>
