<svg width="420" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dl1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3b3f7"/>
      <stop offset="100%" stop-color="#b97fdc"/>
    </linearGradient>
    <linearGradient id="l1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3d1f7"/>
      <stop offset="100%" stop-color="#6fa8dc"/>
    </linearGradient>
    <linearGradient id="l2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3f7d1"/>
      <stop offset="100%" stop-color="#4ecb8c"/>
    </linearGradient>
    <linearGradient id="out" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e3b3"/>
      <stop offset="100%" stop-color="#f4b942"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#b0c4de"/>
