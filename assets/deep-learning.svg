    <polyline points="80,60 90,60" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="160,60 170,60" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="240,60 250,60" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="320,60 330,60" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
