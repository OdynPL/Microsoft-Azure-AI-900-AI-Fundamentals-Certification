<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">RAG – Retrieval Augmented Generation</text>
  <!-- User query -->
  <rect x="15" y="35" width="85" height="30" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5" rx="6"/>
  <text x="57" y="54" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Pytanie user</text>
  <!-- Arrow to search -->
  <line x1="103" y1="50" x2="118" y2="50" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Search / Retrieval -->
  <rect x="122" y="35" width="75" height="30" fill="#FFF3CD" stroke="#E6A800" stroke-width="1.5" rx="6"/>
  <text x="159" y="48" text-anchor="middle" fill="#8B6A00" font-size="7" font-weight="bold">AI Search</text>
  <text x="159" y="58" text-anchor="middle" fill="#8B6A00" font-size="6">vector + keyword</text>
  <!-- Arrow to documents -->
  <line x1="200" y1="50" x2="215" y2="50" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Retrieved documents -->
  <rect x="218" y="30" width="80" height="40" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="258" y="46" text-anchor="middle" fill="#0078D4" font-size="7" font-weight="bold">Dokumenty</text>
  <text x="258" y="58" text-anchor="middle" fill="#555" font-size="6">top-K fragmentów</text>
  <!-- Arrow down to LLM -->
  <line x1="160" y1="68" x2="160" y2="85" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="258" y1="73" x2="258" y2="85" stroke="#0078D4" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- LLM -->
  <rect x="90" y="88" width="225" height="35" fill="#C0DCFA" stroke="#0078D4" stroke-width="2" rx="8"/>
  <text x="202" y="106" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">LLM (GPT-4o)</text>
  <text x="202" y="117" text-anchor="middle" fill="#555" font-size="7">Pytanie + kontekst z dokumentów</text>
  <!-- Arrow to answer -->
  <line x1="202" y1="126" x2="202" y2="140" stroke="#28A745" stroke-width="2" marker-end="url(#arrG)"/>
  <!-- Grounded answer -->
  <rect x="110" y="143" width="185" height="28" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" rx="6"/>
  <text x="202" y="161" text-anchor="middle" fill="#28A745" font-size="9" font-weight="bold">Odpowiedź + cytaty ze źródeł</text>
  <!-- Info box -->
  <rect x="340" y="30" width="130" height="130" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="405" y="48" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Cechy RAG</text>
  <text x="348" y="64" fill="#333" font-size="7">• Redukcja halucynacji</text>
  <text x="348" y="77" fill="#333" font-size="7">• Aktualne dane</text>
  <text x="348" y="90" fill="#333" font-size="7">• Grounding w źródłach</text>
  <text x="348" y="103" fill="#333" font-size="7">• Azure AI Search</text>
  <text x="348" y="116" fill="#333" font-size="7">• Embeddings + chunks</text>
  <text x="348" y="129" fill="#333" font-size="7">• Hybrid search</text>
  <text x="348" y="142" fill="#333" font-size="7">• On Your Data (Azure)</text>
  <text x="348" y="155" fill="#333" font-size="7">• Cytaty = weryfikacja</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#555"/></marker>
    <marker id="arrB" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0078D4"/></marker>
    <marker id="arrG" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#28A745"/></marker>
  </defs>
</svg>