<svg width="700" height="180" xmlns="http://www.w3.org/2000/svg">
<svg width="700" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#fafdff"/>
      <stop offset="100%" stop-color="#e3eaf7"/>
    </radialGradient>
    <linearGradient id="tekst" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3d1f7"/>
      <stop offset="100%" stop-color="#6fa8dc"/>
    </linearGradient>
    <linearGradient id="analiza" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3f7d1"/>
      <stop offset="100%" stop-color="#4ecb8c"/>
    </linearGradient>
    <linearGradient id="wynik" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e3b3"/>
      <stop offset="100%" stop-color="#f4b942"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#b0c4de"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#888" />
    </marker>
  </defs>
  <rect width="700" height="180" fill="url(#bg)"/>
  <g font-family="Segoe UI, Arial" font-size="15">
    <text x="350" y="38" text-anchor="middle" font-size="26" fill="#1a355e" font-weight="bold">NLP</text>
    <!-- Bloki -->
    <g filter="url(#shadow)">
      <rect x="80" y="80" width="150" height="60" rx="18" fill="url(#tekst)"/>
      <text x="155" y="115" text-anchor="middle" fill="#1a355e" font-size="16" font-weight="bold">Tekst</text>
      <rect x="275" y="80" width="150" height="60" rx="18" fill="url(#analiza)"/>
      <text x="350" y="115" text-anchor="middle" fill="#1a3e2b" font-size="16" font-weight="bold">Analiza</text>
      <rect x="470" y="80" width="150" height="60" rx="18" fill="url(#wynik)"/>
      <text x="545" y="115" text-anchor="middle" fill="#7a4e1a" font-size="16" font-weight="bold">Wynik</text>
    </g>
    <!-- Strzałki -->
    <polyline points="230,110 275,110" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="425,110 470,110" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
</svg>