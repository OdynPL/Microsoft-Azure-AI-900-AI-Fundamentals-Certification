<svg width="520" height="140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="img" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3d1f7"/>
      <stop offset="100%" stop-color="#6fa8dc"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3b3f7"/>
      <stop offset="100%" stop-color="#b97fdc"/>
    </linearGradient>
    <linearGradient id="out" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3f7d1"/>
      <stop offset="100%" stop-color="#4ecb8c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#b0c4de"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#888" />
    </marker>
  </defs>
  <rect width="520" height="140" rx="18" fill="#fafdff"/>
  <g font-family="Segoe UI, Arial" font-size="15">
    <text x="260" y="32" text-anchor="middle" font-size="22" fill="#1a355e" font-weight="bold">Azure AI Face</text>
    <g filter="url(#shadow)">
      <rect x="30" y="70" width="100" height="50" rx="12" fill="url(#img)"/>
      <text x="80" y="100" text-anchor="middle" fill="#1a355e" font-weight="bold">Obraz</text>
      <rect x="160" y="70" width="120" height="50" rx="12" fill="url(#ai)"/>
      <text x="220" y="100" text-anchor="middle" fill="#4e1a7a" font-weight="bold">Analiza AI</text>
      <rect x="310" y="70" width="180" height="50" rx="12" fill="url(#out)"/>
      <text x="400" y="92" text-anchor="middle" fill="#1a3e2b" font-weight="bold">Atrybuty twarzy:</text>
      <text x="400" y="112" text-anchor="middle" fill="#1a3e2b">wiek, płeć, emocje, identyfikacja</text>
    </g>
    <polyline points="130,95 160,95" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="280,95 310,95" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>