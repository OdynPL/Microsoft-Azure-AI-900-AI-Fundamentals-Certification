<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">MaaS – Model as a Service</text>
  <!-- Left: MaaS (Serverless) -->
  <rect x="15" y="28" width="215" height="105" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" rx="8"/>
  <text x="122" y="44" text-anchor="middle" fill="#28A745" font-size="10" font-weight="bold">MaaS (Serverless API)</text>
  <!-- API call flow -->
  <rect x="25" y="52" width="60" height="28" fill="#FFF" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="55" y="64" text-anchor="middle" fill="#333" font-size="7" font-weight="bold">Twoja</text>
  <text x="55" y="74" text-anchor="middle" fill="#333" font-size="7" font-weight="bold">aplikacja</text>
  <line x1="88" y1="66" x2="103" y2="66" stroke="#28A745" stroke-width="1.5" marker-end="url(#arrG)"/>
  <rect x="107" y="52" width="55" height="28" fill="#28A745" stroke="#1B7A30" stroke-width="1" rx="4"/>
  <text x="134" y="64" text-anchor="middle" fill="#FFF" font-size="7" font-weight="bold">REST API</text>
  <text x="134" y="74" text-anchor="middle" fill="#D5F5E3" font-size="6">pay-per-token</text>
  <line x1="165" y1="66" x2="175" y2="66" stroke="#28A745" stroke-width="1.5" marker-end="url(#arrG)"/>
  <rect x="179" y="52" width="42" height="28" fill="#FFF" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="200" y="64" text-anchor="middle" fill="#333" font-size="7" font-weight="bold">LLM</text>
  <text x="200" y="74" text-anchor="middle" fill="#999" font-size="6">hosted</text>
  <!-- MaaS features -->
  <text x="25" y="92" fill="#333" font-size="7">✓ Brak zarządzania infra</text>
  <text x="25" y="103" fill="#333" font-size="7">✓ Pay-per-token (użycie)</text>
  <text x="25" y="114" fill="#333" font-size="7">✓ Szybki start</text>
  <text x="130" y="92" fill="#333" font-size="7">✓ Auto-scaling</text>
  <text x="130" y="103" fill="#333" font-size="7">✓ Modele: Llama, Mistral</text>
  <text x="130" y="114" fill="#333" font-size="7">✓ GPT, Phi, Cohere</text>
  <!-- Right: Managed Compute -->
  <rect x="245" y="28" width="222" height="105" fill="#F0F7FF" stroke="#0078D4" stroke-width="1.5" rx="8"/>
  <text x="356" y="44" text-anchor="middle" fill="#0078D4" font-size="10" font-weight="bold">Managed Compute</text>
  <!-- Compute flow -->
  <rect x="255" y="52" width="60" height="28" fill="#FFF" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="285" y="64" text-anchor="middle" fill="#333" font-size="7" font-weight="bold">Twoja</text>
  <text x="285" y="74" text-anchor="middle" fill="#333" font-size="7" font-weight="bold">aplikacja</text>
  <line x1="318" y1="66" x2="333" y2="66" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="337" y="52" width="55" height="28" fill="#0078D4" stroke="#005A9E" stroke-width="1" rx="4"/>
  <text x="364" y="64" text-anchor="middle" fill="#FFF" font-size="7" font-weight="bold">Endpoint</text>
  <text x="364" y="74" text-anchor="middle" fill="#D6EAF8" font-size="6">per-hour</text>
  <line x1="395" y1="66" x2="405" y2="66" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="409" y="52" width="50" height="28" fill="#FFF" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="434" y="64" text-anchor="middle" fill="#333" font-size="7" font-weight="bold">GPU</text>
  <text x="434" y="74" text-anchor="middle" fill="#999" font-size="6">dedyk.</text>
  <!-- Managed features -->
  <text x="255" y="92" fill="#333" font-size="7">✓ Dedykowane GPU/CPU</text>
  <text x="255" y="103" fill="#333" font-size="7">✓ Fine-tuning możliwy</text>
  <text x="255" y="114" fill="#333" font-size="7">✓ Pełna kontrola</text>
  <text x="380" y="92" fill="#333" font-size="7">✓ Własne quota</text>
  <text x="380" y="103" fill="#333" font-size="7">✓ VNet integration</text>
  <text x="380" y="114" fill="#333" font-size="7">✗ Droższy start</text>
  <!-- Bottom comparison -->
  <rect x="15" y="138" width="452" height="32" fill="#FFF3CD" stroke="#E6A800" stroke-width="1" rx="6"/>
  <text x="241" y="152" text-anchor="middle" fill="#8B6A00" font-size="8" font-weight="bold">Egzamin AI-900: MaaS = serverless, pay-per-token, brak infra | Managed = dedykowany compute, per-hour, fine-tuning</text>
  <text x="241" y="164" text-anchor="middle" fill="#555" font-size="7">Azure AI Foundry → Model Catalog → wybierz model → wybierz deployment: Serverless API (MaaS) lub Managed Compute</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0078D4"/></marker>
    <marker id="arrG" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#28A745"/></marker>
  </defs>
</svg>