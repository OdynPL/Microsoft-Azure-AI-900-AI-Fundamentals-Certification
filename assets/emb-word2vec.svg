<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Word2Vec – statyczne wektory słów</text>
  <!-- Vector space -->
  <line x1="30" y1="145" x2="270" y2="145" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="145" x2="30" y2="30" stroke="#333" stroke-width="1.5"/>
  <text x="150" y="162" text-anchor="middle" fill="#333" font-size="8">Wymiar 1</text>
  <text x="15" y="85" text-anchor="middle" fill="#333" font-size="8" transform="rotate(-90,15,85)">Wymiar 2</text>
  <!-- Word clusters -->
  <circle cx="80" cy="55" r="4" fill="#0078D4"/><text x="88" y="53" fill="#0078D4" font-size="8" font-weight="bold">król</text>
  <circle cx="110" cy="45" r="4" fill="#0078D4"/><text x="118" y="43" fill="#0078D4" font-size="8" font-weight="bold">książę</text>
  <circle cx="160" cy="75" r="4" fill="#E74C3C"/><text x="168" y="73" fill="#E74C3C" font-size="8" font-weight="bold">królowa</text>
  <circle cx="190" cy="65" r="4" fill="#E74C3C"/><text x="198" y="63" fill="#E74C3C" font-size="8" font-weight="bold">księżna</text>
  <circle cx="70" cy="115" r="4" fill="#28A745"/><text x="78" y="113" fill="#28A745" font-size="8" font-weight="bold">pies</text>
  <circle cx="100" cy="125" r="4" fill="#28A745"/><text x="108" y="123" fill="#28A745" font-size="8" font-weight="bold">kot</text>
  <!-- Analogy arrow: king - man + woman = queen -->
  <line x1="82" y1="58" x2="156" y2="73" stroke="#999" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="130" y="85" text-anchor="middle" fill="#999" font-size="7">król − mężczyzna + kobieta = królowa</text>
  <!-- Info box -->
  <rect x="285" y="30" width="185" height="125" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="377" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy Word2Vec</text>
  <text x="295" y="64" fill="#333" font-size="8">• 1 słowo = 1 stały wektor</text>
  <text x="295" y="77" fill="#333" font-size="8">• Nie rozróżnia kontekstu</text>
  <text x="295" y="90" fill="#333" font-size="8">• CBOW / Skip-gram</text>
  <text x="295" y="103" fill="#333" font-size="8">• Wymiary: 100–300</text>
  <text x="295" y="116" fill="#333" font-size="8">• Analogie wektorowe</text>
  <text x="295" y="129" fill="#333" font-size="8">• Google, 2013</text>
  <text x="295" y="142" fill="#333" font-size="8">• Słabość: polisemia (bank=?)</text>
  <text x="240" y="175" text-anchor="middle" fill="#666" font-size="8" font-style="italic">Każde słowo ma jeden stały wektor niezależnie od kontekstu zdania</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#999"/></marker>
  </defs>
</svg>