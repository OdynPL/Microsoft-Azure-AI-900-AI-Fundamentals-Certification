<svg width="420" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sp1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3e3f7"/>
      <stop offset="100%" stop-color="#5fa8dc"/>
    </linearGradient>
    <linearGradient id="sp2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e3b3"/>
      <stop offset="100%" stop-color="#f4b942"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#b0c4de"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#888" />
    </marker>
  </defs>
  <rect width="420" height="120" rx="18" fill="#fafdff"/>
  <g font-family="Segoe UI, Arial">
    <text x="210" y="32" text-anchor="middle" font-size="20" fill="#1a355e" font-weight="bold">Azure AI Speech</text>
    <g font-size="13">
      <g filter="url(#shadow)">
        <rect x="30" y="60" width="80" height="40" rx="10" fill="url(#sp1)"/>
        <text x="70" y="85" text-anchor="middle" fill="#1a3e7a" font-weight="bold">Mowa</text>
        <rect x="130" y="60" width="120" height="40" rx="10" fill="url(#sp2)"/>
        <text x="190" y="80" text-anchor="middle" fill="#7a4e1a" font-weight="bold">Przetwarzanie</text>
        <rect x="270" y="60" width="120" height="40" rx="10" fill="url(#sp1)"/>
        <text x="330" y="85" text-anchor="middle" fill="#1a3e7a" font-weight="bold">Tekst / Mowa</text>
      </g>
      <polyline points="110,80 130,80" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
      <polyline points="250,80 270,80" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
  </g>
