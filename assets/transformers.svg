<svg width="260" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tr1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3e3f7"/>
      <stop offset="100%" stop-color="#5fa8dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#b0c4de"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#888" />
    </marker>
  </defs>
  <rect width="260" height="120" rx="18" fill="#fafdff"/>
  <g font-family="Segoe UI, Arial">
    <text x="130" y="28" text-anchor="middle" font-size="20" fill="#1a355e" font-weight="bold">Transformers</text>
    <g font-size="13">
      <g filter="url(#shadow)">
        <rect x="20" y="55" width="60" height="40" rx="10" fill="url(#tr1)"/>
        <text x="50" y="80" text-anchor="middle" fill="#1a3e7a" font-weight="bold">Wejście</text>
        <rect x="90" y="55" width="60" height="40" rx="10" fill="#e3b3f7"/>
        <text x="120" y="80" text-anchor="middle" fill="#4e1a7a" font-weight="bold">Bloki</text>
        <rect x="160" y="55" width="70" height="40" rx="10" fill="#b3f7d1"/>
        <text x="195" y="80" text-anchor="middle" fill="#1a3e2b" font-weight="bold">Wyjście</text>
      </g>
      <polyline points="80,75 90,75" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
      <polyline points="150,75 160,75" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
  </g>
</svg>