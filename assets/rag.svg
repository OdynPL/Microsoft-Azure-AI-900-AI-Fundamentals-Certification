  <line x1="126" y1="99" x2="148" y2="99" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="150" y="68" width="108" height="62" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="204" y="92" text-anchor="middle" font-size="18">🔍</text>
  <text x="204" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Retrieval</text>
  <text x="204" y="124" text-anchor="middle" font-size="9" fill="#64748b">Azure AI Search</text>
  <line x1="260" y1="99" x2="282" y2="99" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="284" y="68" width="118" height="62" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="343" y="92" text-anchor="middle" font-size="18">✏️</text>
  <text x="343" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">Prompt Builder</text>
  <text x="343" y="124" text-anchor="middle" font-size="9" fill="#64748b">System + Pytanie + Kontekst</text>
  <line x1="404" y1="99" x2="426" y2="99" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="428" y="64" width="128" height="70" rx="8" fill="#eff6ff" stroke="#1e40af" stroke-width="2"/>
