<svg viewBox="0 0 780 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <rect width="780" height="360" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker></defs>
  <rect width="780" height="48" fill="#1e40af" rx="12"/><rect y="36" width="780" height="12" fill="#1e40af"/>
  <text x="390" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="white">RAG – Retrieval Augmented Generation</text>
