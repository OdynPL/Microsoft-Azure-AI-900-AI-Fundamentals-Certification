  <text x="492" y="126" text-anchor="middle" font-size="9" fill="#3b82f6">Azure OpenAI</text>
  <line x1="558" y1="99" x2="580" y2="99" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="582" y="68" width="108" height="62" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="636" y="92" text-anchor="middle" font-size="18">💬</text>
  <text x="636" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Odpowiedź</text>
  <text x="636" y="124" text-anchor="middle" font-size="9" fill="#64748b">ze źródeł ✔</text>
  <!-- Knowledge base -->
  <line x1="204" y1="132" x2="204" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="100" y="160" width="208" height="44" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="204" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">📚 Baza Wiedzy</text>
  <text x="204" y="196" text-anchor="middle" font-size="10" fill="#64748b">PDF · FAQ · URL · Baza danych</text>
  <!-- Benefits -->
  <rect x="370" y="152" width="394" height="58" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="567" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Zalety RAG</text>
  <text x="384" y="186" font-size="10" fill="#374151">✅ Aktualne dane  ✅ Bez re-treningu  ✅ Mniej halucynacji  ✅ Łatwy update</text>
  <text x="384" y="200" font-size="10" fill="#374151"> </text>
  <!-- RAG vs Fine-tuning -->
  <rect x="16" y="224" width="748" height="120" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="390" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">⚡ RAG vs Fine-tuning – różnica egzaminacyjna</text>
  <line x1="390" y1="258" x2="390" y2="340" stroke="#fde68a" stroke-width="1"/>
  <text x="30" y="278" font-size="11" font-weight="600" fill="#1e40af">RAG</text>
  <text x="30" y="296" font-size="10" fill="#374151">• LLM + zewnętrzna baza wiedzy</text>
  <text x="30" y="312" font-size="10" fill="#374151">• Nie zmienia wag modelu</text>
  <text x="30" y="328" font-size="10" fill="#374151">• Łatwa aktualizacja (zmiana bazy)</text>
  <text x="404" y="278" font-size="11" font-weight="600" fill="#7c3aed">Fine-tuning</text>
  <text x="404" y="296" font-size="10" fill="#374151">• Trenuje model na własnych danych</text>
  <text x="404" y="312" font-size="10" fill="#374151">• Zmienia wagi modelu</text>
  <text x="404" y="328" font-size="10" fill="#374151">• Własny styl, ton, terminologia</text>
</svg>