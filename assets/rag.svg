<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#203a43"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff"/>
      <stop offset="100%" style="stop-color:#0055aa"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#007a2f"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0"/>
      <stop offset="100%" style="stop-color:#6a0080"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800"/>
      <stop offset="100%" style="stop-color:#b25e00"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64b5f6"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">RAG – Retrieval Augmented Generation</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#90caf9">Model LLM wzbogacony o wiedzę z zewnętrznych źródeł danych</text>

  <!-- User box -->
  <rect x="30" y="100" width="130" height="60" rx="10" fill="url(#blue)" opacity="0.9"/>
  <text x="95" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="white">👤 Użytkownik</text>
  <text x="95" y="146" text-anchor="middle" font-size="11" fill="#cce4ff">"Jakie są zasady</text>
  <text x="95" y="160" text-anchor="middle" font-size="11" fill="#cce4ff">zwrotów?"</text>

  <!-- Arrow 1 -->
  <line x1="162" y1="130" x2="200" y2="130" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="181" y="122" text-anchor="middle" font-size="10" fill="#90caf9">Pytanie</text>

  <!-- Retrieval box -->
  <rect x="200" y="95" width="140" height="70" rx="10" fill="url(#green)" opacity="0.9"/>
  <text x="270" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🔍 Retrieval</text>
  <text x="270" y="140" text-anchor="middle" font-size="11" fill="#ccffcc">Wyszukiwanie</text>
  <text x="270" y="154" text-anchor="middle" font-size="11" fill="#ccffcc">semantyczne</text>

  <!-- Arrow to DB -->
  <line x1="270" y1="165" x2="270" y2="215" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="195" font-size="10" fill="#90caf9">Zapytanie</text>

  <!-- Knowledge base -->
  <ellipse cx="270" cy="270" rx="100" ry="40" fill="#263238" stroke="#42a5f5" stroke-width="2"/>
  <text x="270" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#42a5f5">📚 Baza Wiedzy</text>
  <text x="270" y="282" text-anchor="middle" font-size="10" fill="#90caf9">Azure AI Search</text>

  <!-- Docs icons -->
  <rect x="170" y="320" width="55" height="32" rx="5" fill="#1e3a4a" stroke="#42a5f5" stroke-width="1"/>
  <text x="197" y="332" text-anchor="middle" font-size="10" fill="#90caf9">📄 Docs</text>
  <text x="197" y="344" text-anchor="middle" font-size="9" fill="#64b5f6">PDF/Word</text>
  <rect x="235" y="320" width="55" height="32" rx="5" fill="#1e3a4a" stroke="#42a5f5" stroke-width="1"/>
  <text x="262" y="332" text-anchor="middle" font-size="10" fill="#90caf9">📊 Dane</text>
  <text x="262" y="344" text-anchor="middle" font-size="9" fill="#64b5f6">FAQ/DB</text>
  <rect x="300" y="320" width="55" height="32" rx="5" fill="#1e3a4a" stroke="#42a5f5" stroke-width="1"/>
  <text x="327" y="332" text-anchor="middle" font-size="10" fill="#90caf9">🌐 URL</text>
  <text x="327" y="344" text-anchor="middle" font-size="9" fill="#64b5f6">Strony/API</text>

  <!-- Arrow back from DB to Retrieval -->
  <line x1="340" y1="245" x2="390" y2="190" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="225" font-size="10" fill="#90caf9">Kontekst</text>

  <!-- Prompt construction -->
  <rect x="380" y="95" width="150" height="70" rx="10" fill="url(#purple)" opacity="0.9"/>
  <text x="455" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="white">✏️ Prompt Builder</text>
  <text x="455" y="137" text-anchor="middle" font-size="10" fill="#e1bee7">System Message +</text>
  <text x="455" y="151" text-anchor="middle" font-size="10" fill="#e1bee7">Pytanie + Kontekst</text>

  <!-- Arrow to LLM -->
  <line x1="530" y1="130" x2="578" y2="130" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="554" y="122" text-anchor="middle" font-size="10" fill="#90caf9">Prompt</text>

  <!-- Arrow from Retrieval to Prompt -->
  <line x1="340" y1="130" x2="380" y2="130" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM box -->
  <rect x="578" y="90" width="150" height="80" rx="10" fill="#1a237e" stroke="#7986cb" stroke-width="2"/>
  <text x="653" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#c5cae9">🧠 LLM</text>
  <text x="653" y="136" text-anchor="middle" font-size="11" fill="#9fa8da">Azure OpenAI</text>
  <text x="653" y="152" text-anchor="middle" font-size="10" fill="#7986cb">GPT-4 / GPT-3.5</text>

  <!-- Arrow to response -->
  <line x1="728" y1="130" x2="775" y2="130" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="751" y="122" text-anchor="middle" font-size="10" fill="#90caf9">Odpowiedź</text>

  <!-- Response box -->
  <rect x="775" y="95" width="110" height="70" rx="10" fill="url(#orange)" opacity="0.9"/>
  <text x="830" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="white">💬 Odpowiedź</text>
  <text x="830" y="138" text-anchor="middle" font-size="10" fill="#fff3e0">Oparta na</text>
  <text x="830" y="152" text-anchor="middle" font-size="10" fill="#fff3e0">źródłach ✔</text>

  <!-- Benefits box -->
  <rect x="460" y="260" width="410" height="130" rx="12" fill="#0d2137" stroke="#1565c0" stroke-width="1.5"/>
  <text x="665" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#42a5f5">Kluczowe zalety RAG</text>
  <text x="475" y="308" font-size="11" fill="#90caf9">✅  Redukuje halucynacje – odpowiedzi oparte na faktach</text>
  <text x="475" y="326" font-size="11" fill="#90caf9">✅  Nie wymaga ponownego trenowania modelu</text>
  <text x="475" y="344" font-size="11" fill="#90caf9">✅  Łatwa aktualizacja wiedzy (zmiana bazy danych)</text>
  <text x="475" y="362" font-size="11" fill="#90caf9">✅  Model odpowiada na pytania o aktualne dane firmowe</text>
  <text x="475" y="380" font-size="11" fill="#ffcc80">⚡  RAG ≠ Fine-tuning: RAG dodaje wiedzę, fine-tuning zmienia styl</text>
</svg>
