<svg viewBox="0 0 780 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="780" height="400" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect width="780" height="48" fill="#1e40af" rx="12"/><rect y="36" width="780" height="12" fill="#1e40af"/>
  <text x="390" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="white">Azure OpenAI Service – Architektura</text>
  <!-- Flow: App → Prompt → Content Filter → LLM → Filter → Response -->
  <rect x="16" y="66" width="88" height="56" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="90" text-anchor="middle" font-size="16">💻</text>
  <text x="60" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Aplikacja</text>
  <line x1="104" y1="94" x2="122" y2="94" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="128" y="66" width="88" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="172" y="90" text-anchor="middle" font-size="16">📝</text>
  <text x="172" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Prompt</text>
  <line x1="216" y1="94" x2="234" y2="94" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="240" y="66" width="110" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="295" y="86" text-anchor="middle" font-size="14">🛡️</text>
  <text x="295" y="102" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">Content Filter</text>
  <text x="295" y="114" text-anchor="middle" font-size="8" fill="#64748b">Input</text>
  <line x1="350" y1="94" x2="368" y2="94" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="374" y="60" width="120" height="68" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="434" y="84" text-anchor="middle" font-size="16">🧠</text>
  <text x="434" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">LLM Model</text>
  <text x="434" y="118" text-anchor="middle" font-size="8" fill="#64748b">GPT-4 / GPT-4o</text>
  <line x1="494" y1="94" x2="512" y2="94" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="518" y="66" width="110" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="573" y="86" text-anchor="middle" font-size="14">🛡️</text>
  <text x="573" y="102" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">Content Filter</text>
  <text x="573" y="114" text-anchor="middle" font-size="8" fill="#64748b">Output</text>
  <line x1="628" y1="94" x2="646" y2="94" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="652" y="66" width="112" height="56" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
  <text x="708" y="90" text-anchor="middle" font-size="16">✅</text>
  <text x="708" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Odpowiedź</text>
  <!-- Models -->
  <text x="390" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Dostępne modele</text>
  <rect x="16" y="162" width="180" height="94" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="106" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">GPT-4 / GPT-4o</text>
  <text x="106" y="204" text-anchor="middle" font-size="10" fill="#374151">Generowanie tekstu</text>
  <text x="106" y="220" text-anchor="middle" font-size="10" fill="#374151">Chat, kod, analiza</text>
  <text x="106" y="240" text-anchor="middle" font-size="9" fill="#64748b">Najnowocześniejszy LLM</text>
  <rect x="208" y="162" width="180" height="94" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="298" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">DALL-E 3</text>
  <text x="298" y="204" text-anchor="middle" font-size="10" fill="#374151">Generowanie obrazów</text>
  <text x="298" y="220" text-anchor="middle" font-size="10" fill="#374151">z opisu tekstowego</text>
  <text x="298" y="240" text-anchor="middle" font-size="9" fill="#64748b">Text-to-Image</text>
  <rect x="400" y="162" width="180" height="94" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="490" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Embeddings</text>
  <text x="490" y="204" text-anchor="middle" font-size="10" fill="#374151">Wektory semantyczne</text>
  <text x="490" y="220" text-anchor="middle" font-size="10" fill="#374151">Wyszukiwanie, RAG</text>
  <text x="490" y="240" text-anchor="middle" font-size="9" fill="#64748b">text-embedding-ada-002</text>
  <rect x="592" y="162" width="172" height="94" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="678" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Whisper</text>
  <text x="678" y="204" text-anchor="middle" font-size="10" fill="#374151">Transkrypcja mowy</text>
  <text x="678" y="220" text-anchor="middle" font-size="10" fill="#374151">Speech-to-Text</text>
  <text x="678" y="240" text-anchor="middle" font-size="9" fill="#64748b">Wielojęzyczny</text>
  <!-- Key Concepts -->
  <text x="390" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Kluczowe pojęcia</text>
  <rect x="16" y="294" width="148" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="90" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">System Message</text>
  <text x="90" y="332" text-anchor="middle" font-size="9" fill="#64748b">Instrukcja systemowa</text>
  <text x="90" y="348" text-anchor="middle" font-size="9" fill="#64748b">definiuje zachowanie</text>
  <text x="90" y="364" text-anchor="middle" font-size="9" fill="#64748b">modelu</text>
  <rect x="174" y="294" width="148" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="248" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Temperature</text>
  <text x="248" y="332" text-anchor="middle" font-size="9" fill="#64748b">0 = deterministyczny</text>
  <text x="248" y="348" text-anchor="middle" font-size="9" fill="#64748b">1 = kreatywny</text>
  <text x="248" y="364" text-anchor="middle" font-size="9" fill="#64748b">Kontrola losowości</text>
  <rect x="332" y="294" width="148" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="406" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Grounding</text>
  <text x="406" y="332" text-anchor="middle" font-size="9" fill="#64748b">Zakotwiczenie w</text>
  <text x="406" y="348" text-anchor="middle" font-size="9" fill="#64748b">rzeczywistych danych</text>
  <text x="406" y="364" text-anchor="middle" font-size="9" fill="#64748b">Redukcja halucynacji</text>
  <rect x="490" y="294" width="148" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="564" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Token</text>
  <text x="564" y="332" text-anchor="middle" font-size="9" fill="#64748b">Jednostka tekstu</text>
  <text x="564" y="348" text-anchor="middle" font-size="9" fill="#64748b">~4 znaki = 1 token</text>
  <text x="564" y="364" text-anchor="middle" font-size="9" fill="#64748b">Mierzy koszt / limit</text>
  <rect x="648" y="294" width="116" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="706" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">Fine-tuning</text>
  <text x="706" y="332" text-anchor="middle" font-size="9" fill="#64748b">Dostrajanie</text>
  <text x="706" y="348" text-anchor="middle" font-size="9" fill="#64748b">modelu na</text>
  <text x="706" y="364" text-anchor="middle" font-size="9" fill="#64748b">własnych danych</text>
</svg>