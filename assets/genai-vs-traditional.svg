<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="16" text-anchor="middle" fill="#0078D4" font-size="12" font-weight="bold">Traditional AI vs Generative AI</text>
  <!-- Traditional AI (left) -->
  <rect x="12" y="24" width="220" height="146" fill="#F0F7FF" stroke="#0078D4" stroke-width="1.5" rx="8"/>
  <text x="122" y="40" text-anchor="middle" fill="#0078D4" font-size="10" font-weight="bold">Traditional AI (Predictive)</text>
  <!-- Input -->
  <rect x="22" y="48" width="70" height="22" fill="#D6EAF8" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="57" y="62" text-anchor="middle" fill="#0078D4" font-size="7" font-weight="bold">Dane wejściowe</text>
  <line x1="95" y1="59" x2="110" y2="59" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Model -->
  <rect x="114" y="48" width="50" height="22" fill="#0078D4" stroke="#005A9E" stroke-width="1" rx="4"/>
  <text x="139" y="62" text-anchor="middle" fill="#FFF" font-size="7" font-weight="bold">Model</text>
  <line x1="167" y1="59" x2="177" y2="59" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Output: prediction -->
  <rect x="181" y="48" width="44" height="22" fill="#D6EAF8" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="203" y="56" text-anchor="middle" fill="#0078D4" font-size="6" font-weight="bold">Predykcja</text>
  <text x="203" y="65" text-anchor="middle" fill="#0078D4" font-size="5">(label/score)</text>
  <!-- Capabilities -->
  <text x="22" y="84" fill="#333" font-size="7" font-weight="bold">Zadania:</text>
  <text x="22" y="96" fill="#333" font-size="7">• Klasyfikacja (kot/pies, spam)</text>
  <text x="22" y="107" fill="#333" font-size="7">• Regresja (cena domu)</text>
  <text x="22" y="118" fill="#333" font-size="7">• Detekcja (obiekty, anomalie)</text>
  <text x="22" y="129" fill="#333" font-size="7">• Klasteryzacja (grupy klientów)</text>
  <line x1="22" y1="134" x2="222" y2="134" stroke="#DDD" stroke-width="0.5"/>
  <text x="22" y="146" fill="#555" font-size="7" font-weight="bold">Output: etykieta, liczba, kategoria</text>
  <text x="22" y="157" fill="#555" font-size="6">Analizuje dane → odpowiada na pytanie</text>
  <text x="22" y="167" fill="#999" font-size="6">Nie tworzy nowych treści</text>
  <!-- Generative AI (right) -->
  <rect x="247" y="24" width="222" height="146" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" rx="8"/>
  <text x="358" y="40" text-anchor="middle" fill="#28A745" font-size="10" font-weight="bold">Generative AI (Creative)</text>
  <!-- Input: prompt -->
  <rect x="257" y="48" width="55" height="22" fill="#FFF" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="284" y="62" text-anchor="middle" fill="#28A745" font-size="7" font-weight="bold">Prompt</text>
  <line x1="315" y1="59" x2="330" y2="59" stroke="#28A745" stroke-width="1.5" marker-end="url(#arrG)"/>
  <!-- Model -->
  <rect x="334" y="48" width="50" height="22" fill="#28A745" stroke="#1B7A30" stroke-width="1" rx="4"/>
  <text x="359" y="62" text-anchor="middle" fill="#FFF" font-size="7" font-weight="bold">LLM</text>
  <line x1="387" y1="59" x2="397" y2="59" stroke="#28A745" stroke-width="1.5" marker-end="url(#arrG)"/>
  <!-- Output: new content -->
  <rect x="401" y="48" width="60" height="22" fill="#FFF" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="431" y="56" text-anchor="middle" fill="#28A745" font-size="6" font-weight="bold">Nowa treść</text>
  <text x="431" y="65" text-anchor="middle" fill="#28A745" font-size="5">(tekst/obraz)</text>
  <!-- Capabilities -->
  <text x="257" y="84" fill="#333" font-size="7" font-weight="bold">Zadania:</text>
  <text x="257" y="96" fill="#333" font-size="7">• Generowanie tekstu (artykuły, kod)</text>
  <text x="257" y="107" fill="#333" font-size="7">• Generowanie obrazów (DALL-E)</text>
  <text x="257" y="118" fill="#333" font-size="7">• Podsumowywanie, tłumaczenie</text>
  <text x="257" y="129" fill="#333" font-size="7">• Konwersacja (chatbot, Q&amp;A)</text>
  <line x1="257" y1="134" x2="460" y2="134" stroke="#DDD" stroke-width="0.5"/>
  <text x="257" y="146" fill="#555" font-size="7" font-weight="bold">Output: nowy tekst, obraz, kod, audio</text>
  <text x="257" y="157" fill="#555" font-size="6">Tworzy nowe treści na podstawie promptu</text>
  <text x="257" y="167" fill="#999" font-size="6">Bazuje na Foundation Models (GPT, DALL-E)</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0078D4"/></marker>
    <marker id="arrG" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#28A745"/></marker>
  </defs>
</svg>