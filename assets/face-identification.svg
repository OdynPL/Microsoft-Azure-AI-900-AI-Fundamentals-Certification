<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Face Identification – porównanie 1:N</text>
  <!-- Query face -->
  <rect x="20" y="45" width="65" height="65" fill="#E8F4FD" stroke="#0078D4" stroke-width="2" rx="6"/>
  <ellipse cx="52" cy="70" rx="16" ry="20" fill="#FFF3CD" stroke="#E6A800" stroke-width="1"/>
  <circle cx="46" cy="65" r="2" fill="#333"/>
  <circle cx="58" cy="65" r="2" fill="#333"/>
  <path d="M46,78 Q52,83 58,78" fill="none" stroke="#333" stroke-width="1"/>
  <text x="52" y="120" text-anchor="middle" fill="#0078D4" font-size="7" font-weight="bold">Kto to?</text>
  <!-- Arrow 1:N -->
  <line x1="88" y1="75" x2="108" y2="75" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="98" y="68" text-anchor="middle" fill="#555" font-size="7" font-weight="bold">1:N</text>
  <!-- PersonGroup -->
  <rect x="115" y="35" width="140" height="90" fill="#F0F7FF" stroke="#0078D4" stroke-width="1.5" rx="6"/>
  <text x="185" y="50" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">PersonGroup</text>
  <!-- Persons in group -->
  <rect x="122" y="56" width="36" height="36" fill="#EEE" stroke="#999" stroke-width="1" rx="3"/>
  <circle cx="140" cy="68" r="8" fill="#DDD"/>
  <text x="140" y="87" text-anchor="middle" fill="#999" font-size="6">Anna</text>
  <rect x="163" y="56" width="36" height="36" fill="#D5F5E3" stroke="#28A745" stroke-width="2" rx="3"/>
  <circle cx="181" cy="68" r="8" fill="#B5E8C3"/>
  <text x="181" y="87" text-anchor="middle" fill="#28A745" font-size="6" font-weight="bold">Jan</text>
  <rect x="204" y="56" width="36" height="36" fill="#EEE" stroke="#999" stroke-width="1" rx="3"/>
  <circle cx="222" cy="68" r="8" fill="#DDD"/>
  <text x="222" y="87" text-anchor="middle" fill="#999" font-size="6">Maria</text>
  <text x="185" y="115" text-anchor="middle" fill="#555" font-size="7">N osób z wieloma zdjęciami</text>
  <!-- Result -->
  <line x1="258" y1="75" x2="278" y2="75" stroke="#28A745" stroke-width="2" marker-end="url(#arrG)"/>
  <rect x="282" y="58" width="70" height="35" fill="#D5F5E3" stroke="#28A745" stroke-width="2" rx="6"/>
  <text x="317" y="76" text-anchor="middle" fill="#28A745" font-size="9" font-weight="bold">Jan</text>
  <text x="317" y="88" text-anchor="middle" fill="#28A745" font-size="7">conf: 0.94</text>
  <!-- Info box -->
  <rect x="370" y="35" width="100" height="110" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="420" y="52" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Cechy</text>
  <text x="378" y="67" fill="#333" font-size="7">• 1:N porównanie</text>
  <text x="378" y="80" fill="#333" font-size="7">• „Kto to jest?"</text>
  <text x="378" y="93" fill="#333" font-size="7">• PersonGroup req.</text>
  <text x="378" y="106" fill="#333" font-size="7">• Limited Access</text>
  <text x="378" y="119" fill="#333" font-size="7">• Top-N kandydaci</text>
  <text x="378" y="132" fill="#333" font-size="7">• Train + Identify</text>
  <text x="240" y="155" text-anchor="middle" fill="#666" font-size="8" font-style="italic">Jedno zdjęcie → wyszukiwanie w PersonGroup → „kto to jest?"</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#555"/></marker>
    <marker id="arrG" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#28A745"/></marker>
  </defs>
</svg>