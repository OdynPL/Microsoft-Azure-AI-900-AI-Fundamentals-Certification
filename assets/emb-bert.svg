<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">BERT Embeddings – kontekstowe wektory</text>
  <!-- Sentence 1 -->
  <rect x="15" y="35" width="220" height="25" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="125" y="51" text-anchor="middle" fill="#333" font-size="8">"Idę do <tspan fill="#E74C3C" font-weight="bold">banku</tspan> po pieniądze"</text>
  <!-- Sentence 2 -->
  <rect x="15" y="70" width="220" height="25" fill="#FFF3CD" stroke="#E6A800" stroke-width="1" rx="4"/>
  <text x="125" y="86" text-anchor="middle" fill="#333" font-size="8">"Siedzę na <tspan fill="#E74C3C" font-weight="bold">banku</tspan> w parku"</text>
  <!-- BERT model -->
  <rect x="80" y="105" width="90" height="30" fill="#C0DCFA" stroke="#0078D4" stroke-width="2" rx="8"/>
  <text x="125" y="124" text-anchor="middle" fill="#0078D4" font-size="10" font-weight="bold">BERT</text>
  <line x1="125" y1="60" x2="125" y2="105" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="125" y1="95" x2="125" y2="105" stroke="#E6A800" stroke-width="1.5"/>
  <!-- Different vectors output -->
  <text x="125" y="150" text-anchor="middle" fill="#E74C3C" font-size="8" font-weight="bold">"bank" → RÓŻNE wektory!</text>
  <text x="125" y="164" text-anchor="middle" fill="#555" font-size="7">[0.8, -0.2, ...] ≠ [0.1, 0.7, ...]</text>
  <!-- Info box -->
  <rect x="260" y="30" width="210" height="135" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="365" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy BERT Embeddings</text>
  <text x="270" y="64" fill="#333" font-size="8">• Kontekstowe: ten sam wyraz ≠ ten sam</text>
  <text x="270" y="77" fill="#333" font-size="8">  wektor (zależy od zdania)</text>
  <text x="270" y="90" fill="#333" font-size="8">• Bidirectional (lewo + prawo)</text>
  <text x="270" y="103" fill="#333" font-size="8">• Transformer encoder</text>
  <text x="270" y="116" fill="#333" font-size="8">• 768 wymiarów (base)</text>
  <text x="270" y="129" fill="#333" font-size="8">• NER, sentyment, Q&amp;A</text>
  <text x="270" y="142" fill="#333" font-size="8">• Rozwiązuje problem polisemii</text>
  <text x="270" y="155" fill="#333" font-size="8">• Google, 2018</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0078D4"/></marker>
  </defs>
</svg>