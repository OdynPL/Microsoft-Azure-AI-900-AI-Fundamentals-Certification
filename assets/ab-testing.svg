<svg viewBox="0 0 480 72" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs><marker id="a" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5" fill="none" stroke="#b3b3b3" stroke-width="1"/></marker></defs>
  <text x="240" y="10" text-anchor="middle" font-size="9" font-weight="600" fill="#0078d4">A/B Testing – Traffic Split</text>
  <rect x="0" y="18" width="80" height="28" rx="3" fill="#f3f3f3" stroke="#e8e8e8"/>
  <text x="40" y="30" text-anchor="middle" font-size="7.5" font-weight="600" fill="#505050">Użytkownicy</text>
  <text x="40" y="40" text-anchor="middle" font-size="6.5" fill="#8a8a8a">100% ruchu</text>
  <line x1="82" y1="28" x2="122" y2="22" stroke="#b3b3b3" marker-end="url(#a)"/>
