<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">GloVe – Global Vectors</text>
  <!-- Co-occurrence matrix -->
  <rect x="20" y="35" width="120" height="100" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="80" y="32" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Macierz współwystępowania</text>
  <!-- Headers -->
  <text x="52" y="50" text-anchor="middle" fill="#555" font-size="6">kot</text>
  <text x="78" y="50" text-anchor="middle" fill="#555" font-size="6">pies</text>
  <text x="104" y="50" text-anchor="middle" fill="#555" font-size="6">dom</text>
  <text x="130" y="50" text-anchor="middle" fill="#555" font-size="6">jedzenie</text>
  <!-- Row labels -->
  <text x="36" y="66" text-anchor="end" fill="#555" font-size="6">kot</text>
  <text x="36" y="82" text-anchor="end" fill="#555" font-size="6">pies</text>
  <text x="36" y="98" text-anchor="end" fill="#555" font-size="6">dom</text>
  <text x="36" y="114" text-anchor="end" fill="#555" font-size="6">jedzenie</text>
  <!-- Cells -->
  <rect x="42" y="55" width="20" height="14" fill="#0078D4" opacity="0.1" rx="1"/><text x="52" y="65" text-anchor="middle" fill="#333" font-size="6">–</text>
  <rect x="68" y="55" width="20" height="14" fill="#0078D4" opacity="0.5" rx="1"/><text x="78" y="65" text-anchor="middle" fill="#FFF" font-size="6">15</text>
  <rect x="94" y="55" width="20" height="14" fill="#0078D4" opacity="0.4" rx="1"/><text x="104" y="65" text-anchor="middle" fill="#FFF" font-size="6">12</text>
  <rect x="120" y="55" width="20" height="14" fill="#0078D4" opacity="0.7" rx="1"/><text x="130" y="65" text-anchor="middle" fill="#FFF" font-size="6">25</text>
  <rect x="68" y="71" width="20" height="14" fill="#0078D4" opacity="0.1" rx="1"/><text x="78" y="81" text-anchor="middle" fill="#333" font-size="6">–</text>
  <rect x="94" y="71" width="20" height="14" fill="#0078D4" opacity="0.5" rx="1"/><text x="104" y="81" text-anchor="middle" fill="#FFF" font-size="6">18</text>
  <rect x="120" y="71" width="20" height="14" fill="#0078D4" opacity="0.6" rx="1"/><text x="130" y="81" text-anchor="middle" fill="#FFF" font-size="6">20</text>
  <!-- Arrow -->
  <line x1="143" y1="85" x2="168" y2="85" stroke="#E6A800" stroke-width="2" marker-end="url(#arr)"/>
  <text x="155" y="78" text-anchor="middle" fill="#E6A800" font-size="7" font-weight="bold">SVD</text>
  <!-- Output vectors -->
  <rect x="175" y="55" width="100" height="60" fill="#FFF3CD" stroke="#E6A800" stroke-width="1" rx="4"/>
  <text x="225" y="48" text-anchor="middle" fill="#8B6A00" font-size="8" font-weight="bold">Wektory GloVe</text>
  <text x="185" y="70" fill="#333" font-size="7">kot: [0.3, -0.1, 0.7, ...]</text>
  <text x="185" y="84" fill="#333" font-size="7">pies: [0.4, -0.2, 0.6, ...]</text>
  <text x="185" y="98" fill="#333" font-size="7">dom: [-0.5, 0.8, 0.1, ...]</text>
  <text x="185" y="112" fill="#333" font-size="7">jedzenie: [0.2, 0.1, 0.9, ...]</text>
  <!-- Info box -->
  <rect x="300" y="30" width="170" height="125" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="385" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy GloVe</text>
  <text x="310" y="64" fill="#333" font-size="8">• Statystyka współwystępowania</text>
  <text x="310" y="77" fill="#333" font-size="8">• Globalne (cały korpus)</text>
  <text x="310" y="90" fill="#333" font-size="8">• Stanford, 2014</text>
  <text x="310" y="103" fill="#333" font-size="8">• 300d, 6B / 42B tokenów</text>
  <text x="310" y="116" fill="#333" font-size="8">• Statyczne (jak Word2Vec)</text>
  <text x="310" y="129" fill="#333" font-size="8">• Dobre analogie wektorowe</text>
  <text x="310" y="142" fill="#333" font-size="8">• Pretrenowane i gotowe</text>
  <text x="240" y="170" text-anchor="middle" fill="#666" font-size="8" font-style="italic">Wektory oparte na statystykach współwystępowania słów w dużym korpusie</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#E6A800"/></marker>
  </defs>
</svg>