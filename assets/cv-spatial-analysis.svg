<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Spatial Analysis – analiza przestrzenna wideo</text>
  <!-- Camera view -->
  <rect x="15" y="28" width="210" height="130" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="4"/>
  <text x="120" y="41" text-anchor="middle" fill="#555" font-size="7" font-weight="bold">Widok z kamery (real-time)</text>
  <!-- Zone A -->
  <rect x="25" y="48" width="90" height="55" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" stroke-dasharray="4,2" rx="3"/>
  <text x="70" y="60" text-anchor="middle" fill="#28A745" font-size="7" font-weight="bold">Strefa A</text>
  <!-- People dots in zone A -->
  <circle cx="40" cy="78" r="5" fill="#0078D4"/>
  <text x="40" y="90" text-anchor="middle" fill="#0078D4" font-size="5">ID-1</text>
  <circle cx="65" cy="72" r="5" fill="#0078D4"/>
  <text x="65" y="84" text-anchor="middle" fill="#0078D4" font-size="5">ID-2</text>
  <circle cx="90" cy="82" r="5" fill="#0078D4"/>
  <text x="90" y="94" text-anchor="middle" fill="#0078D4" font-size="5">ID-3</text>
  <!-- Movement arrows -->
  <line x1="42" y1="76" x2="52" y2="72" stroke="#E6A800" stroke-width="1.5" marker-end="url(#arrY)"/>
  <line x1="67" y1="70" x2="77" y2="75" stroke="#E6A800" stroke-width="1.5" marker-end="url(#arrY)"/>
  <!-- Zone B -->
  <rect x="125" y="48" width="90" height="55" fill="#FFF3CD" stroke="#E6A800" stroke-width="1.5" stroke-dasharray="4,2" rx="3"/>
  <text x="170" y="60" text-anchor="middle" fill="#8B6A00" font-size="7" font-weight="bold">Strefa B</text>
  <circle cx="150" cy="80" r="5" fill="#0078D4"/>
  <text x="150" y="92" text-anchor="middle" fill="#0078D4" font-size="5">ID-4</text>
  <!-- Entry line -->
  <line x1="25" y1="108" x2="210" y2="108" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="120" y="120" text-anchor="middle" fill="#E74C3C" font-size="7" font-weight="bold">Linia wejścia/wyjścia</text>
  <!-- Counters -->
  <rect x="30" y="125" width="50" height="26" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="55" y="137" text-anchor="middle" fill="#28A745" font-size="6" font-weight="bold">Weszło</text>
  <text x="55" y="148" text-anchor="middle" fill="#28A745" font-size="10" font-weight="bold">12</text>
  <rect x="90" y="125" width="50" height="26" fill="#FDECEA" stroke="#E74C3C" stroke-width="1" rx="4"/>
  <text x="115" y="137" text-anchor="middle" fill="#E74C3C" font-size="6" font-weight="bold">Wyszło</text>
  <text x="115" y="148" text-anchor="middle" fill="#E74C3C" font-size="10" font-weight="bold">8</text>
  <rect x="150" y="125" width="65" height="26" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="182" y="137" text-anchor="middle" fill="#0078D4" font-size="6" font-weight="bold">Obecnych</text>
  <text x="182" y="148" text-anchor="middle" fill="#0078D4" font-size="10" font-weight="bold">4</text>
  <!-- Info box -->
  <rect x="240" y="28" width="228" height="130" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="354" y="44" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Azure Spatial Analysis</text>
  <text x="250" y="60" fill="#333" font-size="7" font-weight="bold">Możliwości:</text>
  <text x="250" y="72" fill="#333" font-size="7">• Liczenie osób w strefach (people counting)</text>
  <text x="250" y="84" fill="#333" font-size="7">• Śledzenie ruchu (people tracking)</text>
  <text x="250" y="96" fill="#333" font-size="7">• Mierzenie dystansu między osobami</text>
  <text x="250" y="108" fill="#333" font-size="7">• Wykrywanie wejścia/wyjścia ze stref</text>
  <text x="250" y="120" fill="#333" font-size="7">• Analiza czasu przebywania (dwell time)</text>
  <line x1="250" y1="126" x2="458" y2="126" stroke="#DDD" stroke-width="0.5"/>
  <text x="250" y="138" fill="#555" font-size="7" font-weight="bold">Wymaga: kamera IP + Azure IoT Edge</text>
  <text x="250" y="150" fill="#555" font-size="7">Real-time processing na urządzeniu edge</text>
  <defs>
    <marker id="arrY" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#E6A800"/></marker>
  </defs>
</svg>