<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">One-shot – jeden przykład</text>
  <!-- Prompt box -->
  <rect x="20" y="32" width="270" height="105" fill="#F0F7FF" stroke="#0078D4" stroke-width="1.5" rx="6"/>
  <text x="30" y="48" fill="#0078D4" font-size="8" font-weight="bold">PROMPT:</text>
  <text x="30" y="62" fill="#333" font-size="8">"Sklasyfikuj sentyment:</text>
  <!-- Example (highlighted) -->
  <rect x="28" y="66" width="255" height="22" fill="#FFF3CD" stroke="#E6A800" stroke-width="1" rx="3"/>
  <text x="35" y="80" fill="#8B6A00" font-size="8" font-weight="bold">Przykład: 'Jedzenie było okropne' → Negatywny</text>
  <!-- Task -->
  <text x="30" y="102" fill="#333" font-size="8">Teraz sklasyfikuj:</text>
  <text x="30" y="116" fill="#555" font-size="8" font-style="italic">'Ten produkt jest naprawdę świetny!'"</text>
  <!-- 1 example indicator -->
  <rect x="200" y="35" width="80" height="18" fill="#FFF3CD" stroke="#E6A800" stroke-width="1" rx="4"/>
  <text x="240" y="47" text-anchor="middle" fill="#8B6A00" font-size="7" font-weight="bold">1 przykład</text>
  <!-- Arrow -->
  <line x1="155" y1="140" x2="155" y2="150" stroke="#0078D4" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Response -->
  <rect x="75" y="153" width="160" height="22" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" rx="6"/>
  <text x="155" y="168" text-anchor="middle" fill="#28A745" font-size="10" font-weight="bold">→ Pozytywny</text>
  <!-- Info box -->
  <rect x="310" y="35" width="160" height="110" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="390" y="52" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy One-shot</text>
  <text x="318" y="68" fill="#333" font-size="8">• 1 przykład w promptie</text>
  <text x="318" y="82" fill="#333" font-size="8">• Ustala format odpowiedzi</text>
  <text x="318" y="96" fill="#333" font-size="8">• Lepsze niż zero-shot</text>
  <text x="318" y="110" fill="#333" font-size="8">• Dłuższy prompt = więcej $</text>
  <text x="318" y="124" fill="#333" font-size="8">• Dobry start do testów</text>
  <text x="318" y="138" fill="#333" font-size="8">• Model uczy się formatu</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0078D4"/></marker>
  </defs>
</svg>