<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">MSE – Mean Squared Error</text>
  <!-- Axes -->
  <line x1="40" y1="25" x2="40" y2="145" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="145" x2="265" y2="145" stroke="#333" stroke-width="1.5"/>
  <text x="265" y="158" fill="#333" font-size="8">x</text>
  <text x="48" y="28" fill="#333" font-size="8">y</text>
  <!-- Regression line -->
  <line x1="50" y1="125" x2="250" y2="40" stroke="#0078D4" stroke-width="2"/>
  <!-- Data points with error squares -->
  <circle cx="70" cy="105" r="4" fill="#0078D4"/>
  <rect x="70" y="105" width="12" height="12" fill="#E74C3C" opacity="0.25" stroke="#E74C3C" stroke-width="0.5"/>
  <line x1="70" y1="105" x2="70" y2="117" stroke="#E74C3C" stroke-width="1" stroke-dasharray="2,1"/>
  <circle cx="100" cy="95" r="4" fill="#0078D4"/>
  <rect x="100" y="95" width="8" height="8" fill="#E74C3C" opacity="0.25" stroke="#E74C3C" stroke-width="0.5"/>
  <line x1="100" y1="95" x2="100" y2="103" stroke="#E74C3C" stroke-width="1" stroke-dasharray="2,1"/>
  <circle cx="140" cy="70" r="4" fill="#0078D4"/>
  <rect x="140" y="70" width="18" height="18" fill="#E74C3C" opacity="0.25" stroke="#E74C3C" stroke-width="0.5"/>
  <line x1="140" y1="70" x2="140" y2="88" stroke="#E74C3C" stroke-width="1" stroke-dasharray="2,1"/>
  <circle cx="180" cy="80" r="4" fill="#0078D4"/>
  <rect x="180" y="72" width="8" height="8" fill="#E74C3C" opacity="0.25" stroke="#E74C3C" stroke-width="0.5"/>
  <circle cx="220" cy="42" r="4" fill="#0078D4"/>
  <rect x="220" y="42" width="15" height="15" fill="#E74C3C" opacity="0.25" stroke="#E74C3C" stroke-width="0.5"/>
  <!-- Formula -->
  <text x="155" y="162" text-anchor="middle" fill="#E74C3C" font-size="10" font-weight="bold">MSE = (1/n) Σ(yᵢ − ŷᵢ)²</text>
  <!-- Legend: error squares -->
  <rect x="60" y="37" width="8" height="8" fill="#E74C3C" opacity="0.25" stroke="#E74C3C" stroke-width="0.5"/>
  <text x="72" y="45" fill="#E74C3C" font-size="7">= błąd²</text>
  <!-- Info box -->
  <rect x="290" y="30" width="180" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="380" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy MSE</text>
  <text x="300" y="64" fill="#333" font-size="8">• Regresja: najczęstsza loss</text>
  <text x="300" y="77" fill="#333" font-size="8">• Kara za duże błędy (kwadrat)</text>
  <text x="300" y="90" fill="#333" font-size="8">• Wrażliwa na outliery</text>
  <text x="300" y="103" fill="#333" font-size="8">• Metryka: RMSE = √MSE</text>
  <text x="300" y="116" fill="#333" font-size="8">• Gradient: 2(ŷ-y) / n</text>
  <text x="300" y="129" fill="#333" font-size="8">• Jednostki: y² (np. PLN²)</text>
  <text x="300" y="142" fill="#333" font-size="8">• Alternatywa: MAE, Huber</text>
</svg>