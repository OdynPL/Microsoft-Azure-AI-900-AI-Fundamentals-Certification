<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Elastic Net – L1 + L2 kombinacja</text>
  <!-- Combined region: rounded diamond -->
  <path d="M140,42 Q195,42 195,90 Q195,138 140,138 Q85,138 85,90 Q85,42 140,42Z" fill="#FFF3CD" stroke="#E6A800" stroke-width="2" fill-opacity="0.3"/>
  <!-- L1 diamond (dashed) -->
  <polygon points="140,45 192,90 140,135 88,90" fill="none" stroke="#0078D4" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- L2 circle (dashed) -->
  <circle cx="140" cy="90" r="48" fill="none" stroke="#28A745" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- Axes -->
  <line x1="50" y1="90" x2="230" y2="90" stroke="#333" stroke-width="1"/>
  <line x1="140" y1="35" x2="140" y2="145" stroke="#333" stroke-width="1"/>
  <text x="228" y="85" fill="#333" font-size="8">w₁</text>
  <text x="145" y="38" fill="#333" font-size="8">w₂</text>
  <!-- Legend -->
  <line x1="50" y1="155" x2="65" y2="155" stroke="#0078D4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="68" y="158" fill="#0078D4" font-size="7">L1 (romb)</text>
  <line x1="120" y1="155" x2="135" y2="155" stroke="#28A745" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="138" y="158" fill="#28A745" font-size="7">L2 (koło)</text>
  <line x1="190" y1="155" x2="210" y2="155" stroke="#E6A800" stroke-width="2"/>
  <text x="213" y="158" fill="#8B6A00" font-size="7">Elastic Net</text>
  <text x="140" y="95" text-anchor="middle" fill="#8B6A00" font-size="7" font-weight="bold">α·L1 + (1−α)·L2</text>
  <!-- Info box -->
  <rect x="260" y="30" width="210" height="130" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="365" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy Elastic Net</text>
  <text x="270" y="64" fill="#333" font-size="8">• λ₁·Σ|wᵢ| + λ₂·Σwᵢ²</text>
  <text x="270" y="77" fill="#333" font-size="8">• α = proporcja L1 vs L2</text>
  <text x="270" y="90" fill="#333" font-size="8">• Łączy selekcję cech i regul.</text>
  <text x="270" y="103" fill="#333" font-size="8">• Lepsze dla skorelowanych cech</text>
  <text x="270" y="116" fill="#333" font-size="8">• α=0: Ridge, α=1: Lasso</text>
  <text x="270" y="129" fill="#333" font-size="8">• Stabilniejsze niż sam L1</text>
  <text x="270" y="142" fill="#333" font-size="8">• sklearn: ElasticNet, l1_ratio</text>
  <!-- Caption -->
  <text x="240" y="172" text-anchor="middle" fill="#666" font-size="8" font-style="italic">Najlepsze z dwóch światów: selekcja cech L1 + stabilność L2</text>
</svg>