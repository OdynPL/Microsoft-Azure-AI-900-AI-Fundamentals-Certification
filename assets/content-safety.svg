<svg viewBox="0 0 780 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="780" height="400" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect width="780" height="48" fill="#dc2626" rx="12"/><rect y="36" width="780" height="12" fill="#dc2626"/>
  <text x="390" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="white">Azure AI Content Safety</text>
  <!-- Input -->
  <rect x="16" y="66" width="120" height="60" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="76" y="90" text-anchor="middle" font-size="14">📥</text>
  <text x="76" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Treść wejściowa</text>
  <line x1="136" y1="96" x2="166" y2="96" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Analysis -->
  <rect x="172" y="62" width="160" height="68" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="252" y="86" text-anchor="middle" font-size="14">🔬</text>
  <text x="252" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Analiza treści</text>
  <text x="252" y="118" text-anchor="middle" font-size="9" fill="#64748b">Severity 0–7</text>
  <line x1="332" y1="96" x2="362" y2="96" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <!-- 4 categories -->
  <rect x="368" y="62" width="196" height="68" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="466" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">4 kategorie zagrożeń</text>
  <text x="466" y="98" text-anchor="middle" font-size="9" fill="#374151">💢 Hate · ⚔️ Violence</text>
  <text x="466" y="114" text-anchor="middle" font-size="9" fill="#374151">🔞 Sexual · 💊 Self-Harm</text>
  <line x1="564" y1="96" x2="594" y2="96" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Decision -->
  <rect x="600" y="62" width="164" height="68" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="682" y="86" text-anchor="middle" font-size="14">⚙️</text>
  <text x="682" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Decyzja</text>
  <text x="682" y="118" text-anchor="middle" font-size="9" fill="#64748b">Na podst. progów</text>
  <!-- Block / Allow -->
  <rect x="600" y="148" width="78" height="42" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="639" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">🚫 BLOCK</text>
  <rect x="686" y="148" width="78" height="42" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="725" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">✅ ALLOW</text>
  <line x1="652" y1="130" x2="639" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="712" y1="130" x2="725" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Severity levels -->
  <rect x="16" y="148" width="568" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Poziomy Severity</text>
  <text x="100" y="186" text-anchor="middle" font-size="10" fill="#065f46">✅ 0 – Bezpieczne</text>
  <text x="250" y="186" text-anchor="middle" font-size="10" fill="#92400e">⚠️ 2 – Niskie ryzyko</text>
  <text x="400" y="186" text-anchor="middle" font-size="10" fill="#dc2626">🔶 4 – Średnie ryzyko</text>
  <text x="530" y="186" text-anchor="middle" font-size="10" fill="#dc2626">🚫 6–7 – Wysokie</text>
  <!-- Use cases -->
  <rect x="16" y="216" width="748" height="76" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Zastosowania</text>
  <text x="130" y="258" text-anchor="middle" font-size="10" fill="#374151">🤖 Chatboty i asystenci AI</text>
  <text x="340" y="258" text-anchor="middle" font-size="10" fill="#374151">📱 Platformy user-generated content</text>
  <text x="560" y="258" text-anchor="middle" font-size="10" fill="#374151">🏫 Systemy edukacyjne</text>
  <text x="130" y="278" text-anchor="middle" font-size="10" fill="#374151">📢 Media społecznościowe</text>
  <text x="390" y="278" text-anchor="middle" font-size="10" fill="#374151">🎮 Gry online z komunikacją</text>
  <!-- Config -->
  <rect x="16" y="308" width="748" height="76" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Konfiguracja Content Safety</text>
  <text x="390" y="350" text-anchor="middle" font-size="10" fill="#374151">4 poziomy blokowania per kategoria: Low / Medium / High / Off</text>
  <text x="390" y="368" text-anchor="middle" font-size="10" fill="#374151">Content Safety API dostępna osobno lub wbudowana w Azure OpenAI (Content Filters)</text>
</svg>