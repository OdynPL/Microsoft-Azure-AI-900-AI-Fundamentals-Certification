<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Softmax – rozkład prawdopodobieństwa</text>
  <!-- Input logits -->
  <text x="60" y="38" text-anchor="middle" fill="#555" font-size="8" font-weight="bold">Logity (surowe)</text>
  <rect x="20" y="45" width="80" height="22" fill="#EEE" stroke="#999" stroke-width="1" rx="3"/>
  <text x="60" y="60" text-anchor="middle" fill="#555" font-size="9">Kot: 2.5</text>
  <rect x="20" y="70" width="80" height="22" fill="#EEE" stroke="#999" stroke-width="1" rx="3"/>
  <text x="60" y="85" text-anchor="middle" fill="#555" font-size="9">Pies: 1.2</text>
  <rect x="20" y="95" width="80" height="22" fill="#EEE" stroke="#999" stroke-width="1" rx="3"/>
  <text x="60" y="110" text-anchor="middle" fill="#555" font-size="9">Ptak: 0.3</text>
  <!-- Arrow -->
  <rect x="115" y="68" width="55" height="28" fill="#FFF3CD" stroke="#E6A800" stroke-width="1.5" rx="6"/>
  <text x="142" y="86" text-anchor="middle" fill="#8B6A00" font-size="8" font-weight="bold">Softmax</text>
  <text x="142" y="108" text-anchor="middle" fill="#8B6A00" font-size="7">eˣⁱ / Σeˣ</text>
  <!-- Output probabilities -->
  <text x="240" y="38" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Prawdopodobieństwa</text>
  <!-- Bar chart -->
  <rect x="200" y="45" width="80" height="22" fill="#0078D4" stroke="#0078D4" stroke-width="1" rx="3" opacity="0.85"/>
  <text x="240" y="60" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Kot: 0.72</text>
  <rect x="200" y="70" width="80" height="22" fill="#0078D4" stroke="#0078D4" stroke-width="1" rx="3" opacity="0.45"/>
  <text x="240" y="85" text-anchor="middle" fill="#FFF" font-size="9">Pies: 0.20</text>
  <rect x="200" y="95" width="80" height="22" fill="#0078D4" stroke="#0078D4" stroke-width="1" rx="3" opacity="0.2"/>
  <text x="240" y="110" text-anchor="middle" fill="#333" font-size="9">Ptak: 0.08</text>
  <!-- Sum = 1 -->
  <text x="240" y="132" text-anchor="middle" fill="#28A745" font-size="9" font-weight="bold">Suma = 1.00</text>
  <!-- Arrows -->
  <line x1="100" y1="56" x2="115" y2="75" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="81" x2="115" y2="82" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="106" x2="115" y2="88" stroke="#999" stroke-width="1"/>
  <line x1="170" y1="75" x2="200" y2="56" stroke="#0078D4" stroke-width="1"/>
  <line x1="170" y1="82" x2="200" y2="81" stroke="#0078D4" stroke-width="1"/>
  <line x1="170" y1="88" x2="200" y2="106" stroke="#0078D4" stroke-width="1"/>
  <!-- Info box -->
  <rect x="300" y="30" width="170" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="385" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy Softmax</text>
  <text x="310" y="64" fill="#333" font-size="8">• Normalizacja do prawdop.</text>
  <text x="310" y="77" fill="#333" font-size="8">• Suma wyjść = 1</text>
  <text x="310" y="90" fill="#333" font-size="8">• Klasyfikacja wieloklasowa</text>
  <text x="310" y="103" fill="#333" font-size="8">• Warstwa wyjściowa</text>
  <text x="310" y="116" fill="#333" font-size="8">• Wzmacnia najwyższe wart.</text>
  <text x="310" y="129" fill="#333" font-size="8">• Używana z Cross-Entropy</text>
  <text x="310" y="142" fill="#333" font-size="8">• Temp. ↑ = bardziej równomierne</text>
  <!-- Legend -->
  <text x="150" y="165" text-anchor="middle" fill="#666" font-size="8" font-style="italic">Softmax zamienia surowe logity na prawdopodobieństwa klas</text>
</svg>