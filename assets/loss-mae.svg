<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">MAE – Mean Absolute Error</text>
  <!-- Axes -->
  <line x1="40" y1="25" x2="40" y2="145" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="145" x2="265" y2="145" stroke="#333" stroke-width="1.5"/>
  <text x="265" y="158" fill="#333" font-size="8">x</text>
  <text x="48" y="28" fill="#333" font-size="8">y</text>
  <!-- Regression line -->
  <line x1="50" y1="125" x2="250" y2="40" stroke="#0078D4" stroke-width="2"/>
  <!-- Data points with absolute error bars -->
  <circle cx="70" cy="105" r="4" fill="#0078D4"/>
  <line x1="70" y1="105" x2="70" y2="118" stroke="#28A745" stroke-width="2.5"/>
  <circle cx="100" cy="95" r="4" fill="#0078D4"/>
  <line x1="100" y1="95" x2="100" y2="103" stroke="#28A745" stroke-width="2.5"/>
  <circle cx="140" cy="70" r="4" fill="#0078D4"/>
  <line x1="140" y1="70" x2="140" y2="88" stroke="#28A745" stroke-width="2.5"/>
  <circle cx="180" cy="80" r="4" fill="#0078D4"/>
  <line x1="180" y1="72" x2="180" y2="80" stroke="#28A745" stroke-width="2.5"/>
  <circle cx="220" cy="42" r="4" fill="#0078D4"/>
  <line x1="220" y1="42" x2="220" y2="55" stroke="#28A745" stroke-width="2.5"/>
  <!-- Outlier comparison -->
  <circle cx="195" cy="130" r="4" fill="#E74C3C"/>
  <line x1="195" y1="65" x2="195" y2="130" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="200" y="100" fill="#E74C3C" font-size="7">outlier</text>
  <!-- Legend: error bars -->
  <line x1="60" y1="37" x2="60" y2="47" stroke="#28A745" stroke-width="2.5"/>
  <text x="67" y="45" fill="#28A745" font-size="7">= |błąd|</text>
  <!-- Formula -->
  <text x="155" y="162" text-anchor="middle" fill="#28A745" font-size="10" font-weight="bold">MAE = (1/n) Σ|yᵢ − ŷᵢ|</text>
  <!-- MSE vs MAE comparison -->
  <text x="155" y="175" text-anchor="middle" fill="#999" font-size="7">vs MSE: liniowa kara zamiast kwadratowej → mniej wrażliwa na outliery</text>
  <!-- Info box -->
  <rect x="290" y="30" width="180" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="380" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy MAE</text>
  <text x="300" y="64" fill="#333" font-size="8">• Regresja: alternatywa MSE</text>
  <text x="300" y="77" fill="#333" font-size="8">• Liniowa kara za błędy</text>
  <text x="300" y="90" fill="#333" font-size="8">• Odporna na outliery</text>
  <text x="300" y="103" fill="#333" font-size="8">• Mediana jako optymalny pred.</text>
  <text x="300" y="116" fill="#333" font-size="8">• Gradient: +1 lub −1</text>
  <text x="300" y="129" fill="#333" font-size="8">• Jednostki: y (np. PLN)</text>
  <text x="300" y="142" fill="#333" font-size="8">• Huber: kompromis MAE/MSE</text>
</svg>