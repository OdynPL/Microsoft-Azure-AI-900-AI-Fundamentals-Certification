<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Tanh – f(x) = (eˣ−e⁻ˣ)/(eˣ+e⁻ˣ)</text>
  <!-- Axes -->
  <line x1="140" y1="25" x2="140" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="10" y1="90" x2="270" y2="90" stroke="#333" stroke-width="1.5"/>
  <text x="275" y="94" fill="#333" font-size="8">x</text>
  <text x="144" y="25" fill="#333" font-size="8">f(x)</text>
  <!-- Grid lines -->
  <line x1="10" y1="35" x2="270" y2="35" stroke="#EEE" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="135" y="38" text-anchor="end" fill="#999" font-size="7">+1</text>
  <line x1="10" y1="145" x2="270" y2="145" stroke="#EEE" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="135" y="148" text-anchor="end" fill="#999" font-size="7">−1</text>
  <text x="135" y="94" text-anchor="end" fill="#999" font-size="7">0</text>
  <!-- Tanh curve -->
  <polyline points="10,143 30,142 50,140 70,135 90,125 110,108 125,98 140,90 155,82 170,72 190,55 210,48 230,40 250,37 270,36" fill="none" stroke="#28A745" stroke-width="3" stroke-linecap="round"/>
  <!-- Zero-centered label -->
  <circle cx="140" cy="90" r="4" fill="#28A745"/>
  <text x="155" y="105" fill="#28A745" font-size="7">(0, 0)</text>
  <!-- Labels -->
  <text x="50" y="128" text-anchor="middle" fill="#E74C3C" font-size="7">→ −1</text>
  <text x="230" y="50" text-anchor="middle" fill="#28A745" font-size="7">→ +1</text>
  <!-- Comparison with Sigmoid (dashed) -->
  <polyline points="10,143 30,142 50,140 70,137 90,130 110,115 125,100 140,62 155,45 170,37 190,33 210,31 230,30 250,29 270,29" fill="none" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="250" y="25" text-anchor="end" fill="#0078D4" font-size="7" opacity="0.6">Sigmoid (0,1)</text>
  <!-- Info box -->
  <rect x="290" y="30" width="180" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="380" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy Tanh</text>
  <text x="300" y="64" fill="#333" font-size="8">• Wyjście: zakres (−1, +1)</text>
  <text x="300" y="77" fill="#333" font-size="8">• Zero-centered (wyśrodkowana)</text>
  <text x="300" y="90" fill="#333" font-size="8">• Lepsza od Sigmoid w ukrytych</text>
  <text x="300" y="103" fill="#333" font-size="8">• Szybsza zbieżność treningu</text>
  <text x="300" y="116" fill="#333" font-size="8">• Nadal: vanishing gradient</text>
  <text x="300" y="129" fill="#333" font-size="8">• Używana w LSTM (bramki)</text>
  <text x="300" y="142" fill="#333" font-size="8">• tanh = 2·sigmoid(2x) − 1</text>
</svg>