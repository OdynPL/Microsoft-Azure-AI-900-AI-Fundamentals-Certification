<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Synonym Replacement – augmentacja tekstu</text>
  <!-- Original sentence -->
  <text x="20" y="42" fill="#555" font-size="8" font-weight="bold">Zdanie oryginalne:</text>
  <rect x="20" y="48" width="440" height="25" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="240" y="65" text-anchor="middle" fill="#333" font-size="10">"Szybki kot przeskoczył przez wysoki płot"</text>
  <!-- Arrow -->
  <line x1="240" y1="76" x2="240" y2="88" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="260" y="86" fill="#0078D4" font-size="7" font-weight="bold">zamiana synonimów</text>
  <!-- Augmented sentences -->
  <text x="20" y="102" fill="#555" font-size="8" font-weight="bold">Wygenerowane warianty:</text>
  <rect x="20" y="107" width="440" height="20" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="3"/>
  <text x="240" y="121" text-anchor="middle" fill="#333" font-size="9">"<tspan fill="#E74C3C" font-weight="bold">Zwinny</tspan> kot przeskoczył przez wysoki płot"</text>
  <rect x="20" y="130" width="440" height="20" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="3"/>
  <text x="240" y="144" text-anchor="middle" fill="#333" font-size="9">"Szybki kot <tspan fill="#E74C3C" font-weight="bold">przesadził</tspan> przez <tspan fill="#E74C3C" font-weight="bold">duży</tspan> płot"</text>
  <!-- Info -->
  <rect x="20" y="155" width="440" height="20" fill="#F0F7FF" stroke="#0078D4" stroke-width="0.5" rx="3"/>
  <text x="240" y="169" text-anchor="middle" fill="#666" font-size="8" font-style="italic">Zachowuje znaczenie zdania, zmienia poszczególne słowa na synonimy (WordNet, thesaurus)</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0078D4"/></marker>
  </defs>
</svg>