<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Transformer – Self-Attention</text>
  <!-- Input tokens -->
  <rect x="20" y="130" width="35" height="22" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" rx="3"/>
  <text x="37" y="144" text-anchor="middle" fill="#0078D4" font-size="7" font-weight="bold">Kot</text>
  <rect x="60" y="130" width="35" height="22" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" rx="3"/>
  <text x="77" y="144" text-anchor="middle" fill="#0078D4" font-size="7" font-weight="bold">siedzi</text>
  <rect x="100" y="130" width="35" height="22" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" rx="3"/>
  <text x="117" y="144" text-anchor="middle" fill="#0078D4" font-size="7" font-weight="bold">na</text>
  <rect x="140" y="130" width="50" height="22" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" rx="3"/>
  <text x="165" y="144" text-anchor="middle" fill="#0078D4" font-size="7" font-weight="bold">macie</text>
  <text x="105" y="170" text-anchor="middle" fill="#999" font-size="7">Input tokens + Positional Encoding</text>
  <!-- Attention matrix -->
  <rect x="30" y="35" width="85" height="85" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="72" y="30" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Attention Weights</text>
  <!-- Headers -->
  <text x="47" y="48" text-anchor="middle" fill="#999" font-size="6">Kot</text>
  <text x="65" y="48" text-anchor="middle" fill="#999" font-size="6">siedzi</text>
  <text x="83" y="48" text-anchor="middle" fill="#999" font-size="6">na</text>
  <text x="101" y="48" text-anchor="middle" fill="#999" font-size="6">macie</text>
  <!-- Row labels -->
  <text x="27" y="62" text-anchor="end" fill="#999" font-size="6">Kot</text>
  <text x="27" y="77" text-anchor="end" fill="#999" font-size="6">siedzi</text>
  <text x="27" y="92" text-anchor="end" fill="#999" font-size="6">na</text>
  <text x="27" y="107" text-anchor="end" fill="#999" font-size="6">macie</text>
  <!-- Heatmap cells -->
  <rect x="38" y="53" width="16" height="13" fill="#0078D4" opacity="0.8" rx="1"/>
  <rect x="56" y="53" width="16" height="13" fill="#0078D4" opacity="0.3" rx="1"/>
  <rect x="74" y="53" width="16" height="13" fill="#0078D4" opacity="0.5" rx="1"/>
  <rect x="92" y="53" width="16" height="13" fill="#0078D4" opacity="0.6" rx="1"/>
  <rect x="38" y="68" width="16" height="13" fill="#0078D4" opacity="0.4" rx="1"/>
  <rect x="56" y="68" width="16" height="13" fill="#0078D4" opacity="0.8" rx="1"/>
  <rect x="74" y="68" width="16" height="13" fill="#0078D4" opacity="0.3" rx="1"/>
  <rect x="92" y="68" width="16" height="13" fill="#0078D4" opacity="0.2" rx="1"/>
  <rect x="38" y="83" width="16" height="13" fill="#0078D4" opacity="0.2" rx="1"/>
  <rect x="56" y="83" width="16" height="13" fill="#0078D4" opacity="0.3" rx="1"/>
  <rect x="74" y="83" width="16" height="13" fill="#0078D4" opacity="0.5" rx="1"/>
  <rect x="92" y="83" width="16" height="13" fill="#0078D4" opacity="0.7" rx="1"/>
  <rect x="38" y="98" width="16" height="13" fill="#0078D4" opacity="0.7" rx="1"/>
  <rect x="56" y="98" width="16" height="13" fill="#0078D4" opacity="0.2" rx="1"/>
  <rect x="74" y="98" width="16" height="13" fill="#0078D4" opacity="0.6" rx="1"/>
  <rect x="92" y="98" width="16" height="13" fill="#0078D4" opacity="0.9" rx="1"/>
  <!-- Arrows from tokens to attention -->
  <line x1="37" y1="130" x2="45" y2="115" stroke="#0078D4" stroke-width="0.7" opacity="0.4"/>
  <line x1="77" y1="130" x2="65" y2="115" stroke="#0078D4" stroke-width="0.7" opacity="0.4"/>
  <line x1="117" y1="130" x2="83" y2="115" stroke="#0078D4" stroke-width="0.7" opacity="0.4"/>
  <line x1="165" y1="130" x2="100" y2="115" stroke="#0078D4" stroke-width="0.7" opacity="0.4"/>
  <!-- Q K V -->
  <rect x="135" y="40" width="50" height="20" fill="#FFF3CD" stroke="#E6A800" stroke-width="1" rx="4"/>
  <text x="160" y="54" text-anchor="middle" fill="#8B6A00" font-size="8" font-weight="bold">Q · K / V</text>
  <rect x="135" y="68" width="50" height="20" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="160" y="82" text-anchor="middle" fill="#28A745" font-size="8" font-weight="bold">Softmax</text>
  <rect x="135" y="96" width="50" height="20" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" rx="4"/>
  <text x="160" y="110" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Output</text>
  <line x1="160" y1="60" x2="160" y2="68" stroke="#555" stroke-width="1"/>
  <line x1="160" y1="88" x2="160" y2="96" stroke="#555" stroke-width="1"/>
  <!-- Info box -->
  <rect x="210" y="30" width="260" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="340" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Mechanizm Attention</text>
  <text x="220" y="64" fill="#333" font-size="8">• Query (Q) × Key (K) = wagi uwagi</text>
  <text x="220" y="77" fill="#333" font-size="8">• Softmax normalizuje wagi do prawdopod.</text>
  <text x="220" y="90" fill="#333" font-size="8">• Value (V) × wagi = kontekstowy wynik</text>
  <text x="220" y="103" fill="#333" font-size="8">• Multi-Head: równoległe attention</text>
  <text x="220" y="116" fill="#333" font-size="8">• Podstawa GPT (decoder), BERT (encoder)</text>
  <text x="220" y="129" fill="#333" font-size="8">• Attention Is All You Need (2017)</text>
  <text x="220" y="142" fill="#333" font-size="8">• Pozycyjne kodowanie zamiast rekurencji</text>
</svg>