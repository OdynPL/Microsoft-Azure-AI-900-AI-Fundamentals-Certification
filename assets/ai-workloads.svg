<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="720" height="300" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect width="720" height="48" fill="#1e40af" rx="12"/><rect y="36" width="720" height="12" fill="#1e40af"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="white">Typowe workloady AI</text>
  <!-- Row 1: 3 main -->
  <rect x="16" y="66" width="220" height="90" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
