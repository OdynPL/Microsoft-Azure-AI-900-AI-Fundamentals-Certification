  <text x="126" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Computer Vision</text>
  <text x="126" y="132" text-anchor="middle" font-size="10" fill="#64748b">Analiza obrazów, OCR, twarze</text>
  <text x="126" y="146" text-anchor="middle" font-size="10" fill="#64748b">segmentacja, detekcja obiektów</text>

  <rect x="250" y="66" width="220" height="90" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="360" y="92" text-anchor="middle" font-size="20">💬</text>
  <text x="360" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">NLP</text>
  <text x="360" y="132" text-anchor="middle" font-size="10" fill="#64748b">Analiza tekstu, sentymenty</text>
  <text x="360" y="146" text-anchor="middle" font-size="10" fill="#64748b">tłumaczenie, mowa</text>

  <rect x="484" y="66" width="220" height="90" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
  <text x="594" y="92" text-anchor="middle" font-size="20">✨</text>
  <text x="594" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Generatywna AI</text>
  <text x="594" y="132" text-anchor="middle" font-size="10" fill="#64748b">Generowanie tekstu, obrazów</text>
  <text x="594" y="146" text-anchor="middle" font-size="10" fill="#64748b">kodu, muzyki (GPT, DALL-E)</text>

  <!-- Row 2: 2 extra -->
  <rect x="120" y="184" width="230" height="90" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="235" y="210" text-anchor="middle" font-size="20">📄</text>
  <text x="235" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">AI dla Dokumentów</text>
  <text x="235" y="250" text-anchor="middle" font-size="10" fill="#64748b">Ekstrakcja danych, OCR</text>
  <text x="235" y="264" text-anchor="middle" font-size="10" fill="#64748b">Document Intelligence</text>

  <rect x="370" y="184" width="230" height="90" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="485" y="210" text-anchor="middle" font-size="20">🔍</text>
  <text x="485" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Inne</text>
  <text x="485" y="250" text-anchor="middle" font-size="10" fill="#64748b">Rekomendacje, anomalie</text>
  <text x="485" y="264" text-anchor="middle" font-size="10" fill="#64748b">Boty konwersacyjne</text>

  <!-- Arrows -->
  <line x1="126" y1="156" x2="200" y2="184" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="156" x2="270" y2="184" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="156" x2="450" y2="184" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="594" y1="156" x2="520" y2="184" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
