<svg width="700" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#fafdff"/>
      <stop offset="100%" stop-color="#e3eaf7"/>
    </radialGradient>
    <linearGradient id="dane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3d1f7"/>
      <stop offset="100%" stop-color="#6fa8dc"/>
    </linearGradient>
    <linearGradient id="trening" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3f7d1"/>
      <stop offset="100%" stop-color="#4ecb8c"/>
    </linearGradient>
    <linearGradient id="walidacja" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e3b3"/>
      <stop offset="100%" stop-color="#f4b942"/>
    </linearGradient>
    <linearGradient id="wdrozenie" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3b3f7"/>
      <stop offset="100%" stop-color="#b97fdc"/>
    </linearGradient>
    <linearGradient id="monitoring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3e3f7"/>
      <stop offset="100%" stop-color="#5fa8dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#b0c4de"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#888" />
    </marker>
  </defs>
  <rect width="700" height="180" fill="url(#bg)"/>
  <g font-family="Segoe UI, Arial" font-size="15">
    <text x="350" y="38" text-anchor="middle" font-size="26" fill="#1a355e" font-weight="bold">Cykl życia ML</text>
    <!-- Bloki -->
    <g filter="url(#shadow)">
      <rect x="60" y="80" width="110" height="60" rx="18" fill="url(#dane)"/>
      <text x="115" y="115" text-anchor="middle" fill="#1a355e" font-size="16" font-weight="bold">Dane</text>
      <rect x="190" y="80" width="110" height="60" rx="18" fill="url(#trening)"/>
      <text x="245" y="115" text-anchor="middle" fill="#1a3e2b" font-size="16" font-weight="bold">Trening</text>
      <rect x="320" y="80" width="110" height="60" rx="18" fill="url(#walidacja)"/>
      <text x="375" y="115" text-anchor="middle" fill="#7a4e1a" font-size="16" font-weight="bold">Walidacja</text>
      <rect x="450" y="80" width="110" height="60" rx="18" fill="url(#wdrozenie)"/>
      <text x="505" y="115" text-anchor="middle" fill="#4e1a7a" font-size="16" font-weight="bold">Wdrożenie</text>
      <rect x="580" y="80" width="110" height="60" rx="18" fill="url(#monitoring)"/>
      <text x="635" y="115" text-anchor="middle" fill="#1a3e7a" font-size="16" font-weight="bold">Monitoring</text>
    </g>
    <!-- Strzałki -->
    <polyline points="170,110 190,110" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="300,110 320,110" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="430,110 450,110" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="560,110 580,110" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>