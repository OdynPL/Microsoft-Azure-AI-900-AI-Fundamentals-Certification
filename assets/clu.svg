  <text x="136" y="298" text-anchor="middle" font-size="10" fill="#374151">• URL stron internetowych</text>
  <text x="136" y="314" text-anchor="middle" font-size="10" fill="#374151">• Pliki PDF / DOCX</text>
  <text x="136" y="330" text-anchor="middle" font-size="10" fill="#374151">• Ręczne pary Q&amp;A</text>
  <text x="136" y="348" text-anchor="middle" font-size="10" fill="#374151">• Chit-chat (Small Talk)</text>
  <line x1="256" y1="309" x2="286" y2="309" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="292" y="254" width="200" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="392" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">🧠 Knowledge Base</text>
