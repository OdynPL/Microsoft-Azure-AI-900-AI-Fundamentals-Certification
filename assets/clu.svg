<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="780" height="380" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect width="780" height="48" fill="#1e40af" rx="12"/><rect y="36" width="780" height="12" fill="#1e40af"/>
  <text x="390" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="white">CLU &amp; Question Answering – Azure AI Language</text>
  <!-- CLU Flow -->
  <text x="390" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Conversational Language Understanding (CLU)</text>
  <rect x="16" y="86" width="140" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="86" y="108" text-anchor="middle" font-size="14">💬</text>
  <text x="86" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Wypowiedź (Utterance)</text>
  <line x1="156" y1="114" x2="186" y2="114" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="192" y="86" width="130" height="56" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="257" y="108" text-anchor="middle" font-size="14">🧠</text>
  <text x="257" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Model CLU</text>
  <line x1="322" y1="114" x2="352" y2="99" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="322" y1="114" x2="352" y2="129" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="358" y="76" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="438" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">🎯 Intencja (Intent)</text>
  <rect x="358" y="116" width="160" height="34" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="438" y="138" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">🏷️ Encje (Entities)</text>
  <line x1="518" y1="114" x2="548" y2="114" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="554" y="86" width="210" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="659" y="108" text-anchor="middle" font-size="14">⚡</text>
  <text x="659" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Akcja / Odpowiedź</text>
