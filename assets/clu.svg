  <text x="392" y="316" text-anchor="middle" font-size="10" fill="#374151">Multi-turn (dialog tree)</text>
  <text x="392" y="334" text-anchor="middle" font-size="10" fill="#374151">Prompts / Follow-up</text>
  <text x="392" y="352" text-anchor="middle" font-size="10" fill="#64748b">Confidence Score 0–1</text>
  <line x1="492" y1="309" x2="522" y2="309" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="528" y="254" width="236" height="110" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="646" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">🤖 Deploy</text>
  <text x="646" y="298" text-anchor="middle" font-size="10" fill="#374151">Endpoint REST API</text>
  <text x="646" y="316" text-anchor="middle" font-size="10" fill="#374151">Bot Framework integration</text>
  <text x="646" y="334" text-anchor="middle" font-size="10" fill="#374151">Active Learning (sugestie)</text>
  <text x="646" y="352" text-anchor="middle" font-size="10" fill="#64748b">DefaultAnswer fallback</text>
</svg>