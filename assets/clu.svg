  <rect x="16" y="158" width="748" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">CLU – Trening</text>
  <text x="120" y="200" text-anchor="middle" font-size="10" fill="#374151">1️⃣ Definiuj intencje</text>
  <text x="300" y="200" text-anchor="middle" font-size="10" fill="#374151">2️⃣ Definiuj encje</text>
  <text x="480" y="200" text-anchor="middle" font-size="10" fill="#374151">3️⃣ Dodaj wypowiedzi (min. 5)</text>
  <text x="670" y="200" text-anchor="middle" font-size="10" fill="#374151">4️⃣ Trenuj i testuj model</text>
  <!-- Question Answering -->
  <text x="390" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">Custom Question Answering</text>
  <rect x="16" y="254" width="240" height="110" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
