<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="780" height="420" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect width="780" height="48" fill="#1e40af" rx="12"/><rect y="36" width="780" height="12" fill="#1e40af"/>
  <text x="390" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="white">No-code / Low-code ML na Azure</text>
  <!-- Spectrum bar -->
  <rect x="16" y="62" width="248" height="28" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="81" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">NO-CODE</text>
  <rect x="270" y="62" width="240" height="28" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="81" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">LOW-CODE</text>
  <rect x="516" y="62" width="248" height="28" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="640" y="81" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">FULL-CODE</text>
  <!-- Tool 1: ML Designer -->
  <rect x="16" y="106" width="180" height="140" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="106" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">🎨 ML Designer</text>
  <text x="106" y="148" text-anchor="middle" font-size="10" fill="#374151">Drag &amp; Drop pipeline</text>
  <text x="106" y="164" text-anchor="middle" font-size="10" fill="#374151">Azure Machine Learning</text>
  <text x="106" y="186" text-anchor="middle" font-size="9" fill="#64748b">✔ Moduły gotowe</text>
  <text x="106" y="200" text-anchor="middle" font-size="9" fill="#64748b">✔ Wizualny przepływ</text>
  <text x="106" y="214" text-anchor="middle" font-size="9" fill="#64748b">✔ Export do kodu Python</text>
  <text x="106" y="232" text-anchor="middle" font-size="9" fill="#059669">→ Dla data scientistów</text>
  <!-- Tool 2: AutoML -->
  <rect x="208" y="106" width="180" height="140" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="298" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">🤖 AutoML</text>
  <text x="298" y="148" text-anchor="middle" font-size="10" fill="#374151">Automatyczne ML</text>
  <text x="298" y="164" text-anchor="middle" font-size="10" fill="#374151">Azure Machine Learning</text>
  <text x="298" y="186" text-anchor="middle" font-size="9" fill="#64748b">✔ Klasyfikacja, regresja</text>
  <text x="298" y="200" text-anchor="middle" font-size="9" fill="#64748b">✔ Szeregi czasowe</text>
  <text x="298" y="214" text-anchor="middle" font-size="9" fill="#64748b">✔ Computer Vision, NLP</text>
  <text x="298" y="232" text-anchor="middle" font-size="9" fill="#1e40af">→ Wskaż dane, reszta auto</text>
  <!-- Tool 3: AI Builder -->
  <rect x="400" y="106" width="180" height="140" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="490" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">⚡ AI Builder</text>
  <text x="490" y="148" text-anchor="middle" font-size="10" fill="#374151">Power Platform</text>
  <text x="490" y="164" text-anchor="middle" font-size="10" fill="#374151">Power Apps / Automate</text>
  <text x="490" y="186" text-anchor="middle" font-size="9" fill="#64748b">✔ Analiza dokumentów</text>
  <text x="490" y="200" text-anchor="middle" font-size="9" fill="#64748b">✔ Klasyfikacja tekstu</text>
  <text x="490" y="214" text-anchor="middle" font-size="9" fill="#64748b">✔ Predykcja biznesowa</text>
  <text x="490" y="232" text-anchor="middle" font-size="9" fill="#6d28d9">→ Dla użytkowników biz.</text>
  <!-- Tool 4: Copilot Studio -->
  <rect x="592" y="106" width="172" height="140" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
  <text x="678" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">🤖 Copilot Studio</text>
  <text x="678" y="148" text-anchor="middle" font-size="10" fill="#374151">Chatboty &amp; Agenty AI</text>
  <text x="678" y="164" text-anchor="middle" font-size="10" fill="#374151">dawniej Power VA</text>
  <text x="678" y="186" text-anchor="middle" font-size="9" fill="#64748b">✔ Gen AI (GPT) wbudowane</text>
  <text x="678" y="200" text-anchor="middle" font-size="9" fill="#64748b">✔ Custom Knowledge Base</text>
  <text x="678" y="214" text-anchor="middle" font-size="9" fill="#64748b">✔ Teams, web, apps</text>
  <text x="678" y="232" text-anchor="middle" font-size="9" fill="#92400e">→ Dla biz. i deweloperów</text>
  <!-- AutoML Flow -->
  <rect x="16" y="262" width="748" height="140" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="390" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Przepływ AutoML – typowy egzaminacyjny scenariusz</text>
  <!-- 7 steps -->
  <rect x="28" y="298" width="86" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="71" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">1. Dane</text>
  <text x="71" y="334" text-anchor="middle" font-size="8" fill="#64748b">CSV/Azure</text>
  <text x="71" y="346" text-anchor="middle" font-size="8" fill="#64748b">Blob/SQL</text>
  <line x1="114" y1="326" x2="128" y2="326" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="134" y="298" width="86" height="56" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="177" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">2. Zadanie</text>
  <text x="177" y="334" text-anchor="middle" font-size="8" fill="#64748b">Klasyfikacja</text>
  <text x="177" y="346" text-anchor="middle" font-size="8" fill="#64748b">Regresja...</text>
  <line x1="220" y1="326" x2="234" y2="326" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="240" y="298" width="86" height="56" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="283" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">3. Config</text>
  <text x="283" y="334" text-anchor="middle" font-size="8" fill="#64748b">Max czas</text>
  <text x="283" y="346" text-anchor="middle" font-size="8" fill="#64748b">metryka</text>
  <line x1="326" y1="326" x2="340" y2="326" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="346" y="298" width="86" height="56" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="389" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">4. Trening</text>
  <text x="389" y="334" text-anchor="middle" font-size="8" fill="#64748b">Wiele algorytmów</text>
  <text x="389" y="346" text-anchor="middle" font-size="8" fill="#64748b">auto-tuning</text>
  <line x1="432" y1="326" x2="446" y2="326" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="452" y="298" width="86" height="56" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="495" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">5. Najlepszy</text>
  <text x="495" y="334" text-anchor="middle" font-size="8" fill="#64748b">model wybrany</text>
  <text x="495" y="346" text-anchor="middle" font-size="8" fill="#64748b">automatycznie</text>
  <line x1="538" y1="326" x2="552" y2="326" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="558" y="298" width="86" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="601" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">6. Deploy</text>
  <text x="601" y="334" text-anchor="middle" font-size="8" fill="#64748b">REST API</text>
  <text x="601" y="346" text-anchor="middle" font-size="8" fill="#64748b">Endpoint</text>
  <line x1="644" y1="326" x2="658" y2="326" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="664" y="298" width="86" height="56" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="707" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">7. Monitor</text>
  <text x="707" y="334" text-anchor="middle" font-size="8" fill="#64748b">drift, metrics</text>
  <text x="707" y="346" text-anchor="middle" font-size="8" fill="#64748b">retraining</text>

  <text x="390" y="378" text-anchor="middle" font-size="9" fill="#64748b">AutoML automatycznie testuje wiele algorytmów i wybiera najlepszy model na podstawie wybranej metryki</text>
</svg>