<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162035"/>
    </linearGradient>
    <linearGradient id="nocode" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40"/>
      <stop offset="100%" style="stop-color:#003328"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#80cbc4"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">No-code / Low-code ML na Azure</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#80cbc4">Od danych do wdrożonego modelu – bez pisania kodu</text>

  <!-- Spectrum bar -->
  <rect x="30" y="82" width="835" height="30" rx="15" fill="#1e2e3e" stroke="#42a5f5" stroke-width="1"/>
  <rect x="30" y="82" width="280" height="30" rx="15" fill="#004d40" opacity="0.9"/>
  <rect x="310" y="82" width="280" height="30" rx="0" fill="#1a237e" opacity="0.9"/>
  <rect x="590" y="82" width="275" height="30" rx="15" fill="#3e0000" opacity="0.9"/>
  <text x="168" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#80cbc4">NO-CODE</text>
  <text x="450" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#9fa8da">LOW-CODE</text>
  <text x="728" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef9a9a">FULL-CODE</text>

  <!-- Tool 1: Azure ML Designer -->
  <rect x="20" y="130" width="200" height="150" rx="12" fill="url(#nocode)" stroke="#4db6ac" stroke-width="2"/>
  <text x="120" y="157" text-anchor="middle" font-size="13" font-weight="bold" fill="#4db6ac">🎨 ML Designer</text>
  <text x="120" y="177" text-anchor="middle" font-size="11" fill="#b2dfdb">Drag &amp; Drop pipeline</text>
  <text x="120" y="196" text-anchor="middle" font-size="10" fill="#b2dfdb">Azure Machine Learning</text>
  <text x="35" y="216" font-size="10" fill="#80cbc4">✔ Moduły gotowe</text>
  <text x="35" y="232" font-size="10" fill="#80cbc4">✔ Wizualny przepływ</text>
  <text x="35" y="248" font-size="10" fill="#80cbc4">✔ Export do kodu Python</text>
  <text x="35" y="268" font-size="9" fill="#64b5f6">→ Dla data scientistów</text>

  <!-- Tool 2: AutoML -->
  <rect x="230" y="130" width="200" height="150" rx="12" fill="#0d2137" stroke="#42a5f5" stroke-width="2"/>
  <text x="330" y="157" text-anchor="middle" font-size="13" font-weight="bold" fill="#42a5f5">🤖 AutoML</text>
  <text x="330" y="177" text-anchor="middle" font-size="11" fill="#90caf9">Automatyczne ML</text>
  <text x="330" y="196" text-anchor="middle" font-size="10" fill="#90caf9">Azure Machine Learning</text>
  <text x="245" y="216" font-size="10" fill="#64b5f6">✔ Klasyfikacja, regresja</text>
  <text x="245" y="232" font-size="10" fill="#64b5f6">✔ Szeregi czasowe</text>
  <text x="245" y="248" font-size="10" fill="#64b5f6">✔ Computer Vision NLP</text>
  <text x="245" y="268" font-size="9" fill="#42a5f5">→ Wskaż dane, reszta auto</text>

  <!-- Tool 3: AI Builder -->
  <rect x="440" y="130" width="200" height="150" rx="12" fill="#1a237e" stroke="#7986cb" stroke-width="2"/>
  <text x="540" y="157" text-anchor="middle" font-size="13" font-weight="bold" fill="#9fa8da">⚡ AI Builder</text>
  <text x="540" y="177" text-anchor="middle" font-size="11" fill="#c5cae9">Power Platform</text>
  <text x="540" y="196" text-anchor="middle" font-size="10" fill="#c5cae9">Power Apps / Automate</text>
  <text x="455" y="216" font-size="10" fill="#9fa8da">✔ Analiza dokumentów</text>
  <text x="455" y="232" font-size="10" fill="#9fa8da">✔ Klasyfikacja tekstu</text>
  <text x="455" y="248" font-size="10" fill="#9fa8da">✔ Predykcja biznesowa</text>
  <text x="455" y="268" font-size="9" fill="#7986cb">→ Dla użytkowników biz.</text>

  <!-- Tool 4: Copilot Studio -->
  <rect x="650" y="130" width="220" height="150" rx="12" fill="#4a0072" stroke="#ce93d8" stroke-width="2"/>
  <text x="760" y="157" text-anchor="middle" font-size="13" font-weight="bold" fill="#ce93d8">🤖 Copilot Studio</text>
  <text x="760" y="177" text-anchor="middle" font-size="11" fill="#e1bee7">Chatboty &amp; Agenty AI</text>
  <text x="760" y="196" text-anchor="middle" font-size="10" fill="#e1bee7">dawniej Power Virtual Agents</text>
  <text x="663" y="216" font-size="10" fill="#ce93d8">✔ Gen AI (GPT) wbudowane</text>
  <text x="663" y="232" font-size="10" fill="#ce93d8">✔ Custom Knowledge Base</text>
  <text x="663" y="248" font-size="10" fill="#ce93d8">✔ Teams, web, apps</text>
  <text x="663" y="268" font-size="9" fill="#b39ddb">→ Dla biz. i deweloperów</text>

  <!-- Bottom process flow -->
  <rect x="20" y="306" width="855" height="110" rx="12" fill="#0d1b0d" stroke="#388e3c" stroke-width="2"/>
  <text x="450" y="328" text-anchor="middle" font-size="13" font-weight="bold" fill="#a5d6a7">Przepływ AutoML – typowy egzaminacyjny scenariusz</text>

  <!-- Steps -->
  <rect x="35" y="338" width="100" height="64" rx="8" fill="#1b3a1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="85" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5d6a7">1. Dane</text>
  <text x="85" y="376" text-anchor="middle" font-size="10" fill="#81c784">CSV/Azure</text>
  <text x="85" y="391" text-anchor="middle" font-size="10" fill="#81c784">Blob/SQL</text>

  <line x1="137" y1="370" x2="160" y2="370" stroke="#80cbc4" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="162" y="338" width="100" height="64" rx="8" fill="#1b3a1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="212" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5d6a7">2. Zadanie</text>
  <text x="212" y="376" text-anchor="middle" font-size="10" fill="#81c784">Klasyfikacja</text>
  <text x="212" y="391" text-anchor="middle" font-size="10" fill="#81c784">Regresja...</text>

  <line x1="264" y1="370" x2="287" y2="370" stroke="#80cbc4" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="289" y="338" width="100" height="64" rx="8" fill="#1b3a1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="339" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5d6a7">3. Konfiguracja</text>
  <text x="339" y="376" text-anchor="middle" font-size="10" fill="#81c784">Max czas</text>
  <text x="339" y="391" text-anchor="middle" font-size="10" fill="#81c784">metryka</text>

  <line x1="391" y1="370" x2="414" y2="370" stroke="#80cbc4" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="416" y="338" width="100" height="64" rx="8" fill="#1b3a1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="466" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5d6a7">4. Trening</text>
  <text x="466" y="376" text-anchor="middle" font-size="10" fill="#81c784">Wiele algo.</text>
  <text x="466" y="391" text-anchor="middle" font-size="10" fill="#81c784">auto-tuning</text>

  <line x1="518" y1="370" x2="541" y2="370" stroke="#80cbc4" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="543" y="338" width="100" height="64" rx="8" fill="#1b3a1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="593" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5d6a7">5. Najlepszy</text>
  <text x="593" y="376" text-anchor="middle" font-size="10" fill="#81c784">model</text>
  <text x="593" y="391" text-anchor="middle" font-size="10" fill="#81c784">wybrany auto</text>

  <line x1="645" y1="370" x2="668" y2="370" stroke="#80cbc4" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="670" y="338" width="100" height="64" rx="8" fill="#1b3a1b" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="720" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5d6a7">6. Deploy</text>
  <text x="720" y="376" text-anchor="middle" font-size="10" fill="#81c784">REST API</text>
  <text x="720" y="391" text-anchor="middle" font-size="10" fill="#81c784">Endpoint</text>

  <line x1="772" y1="370" x2="795" y2="370" stroke="#80cbc4" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="797" y="338" width="68" height="64" rx="8" fill="#0d47a1" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="831" y="360" text-anchor="middle" font-size="10" font-weight="bold" fill="#42a5f5">7. Monitor</text>
  <text x="831" y="376" text-anchor="middle" font-size="9" fill="#90caf9">drift,</text>
  <text x="831" y="391" text-anchor="middle" font-size="9" fill="#90caf9">metrics</text>
</svg>
