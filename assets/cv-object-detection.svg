<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Object Detection – klasa + bounding box + confidence</text>
  <!-- Image area -->
  <rect x="20" y="30" width="200" height="130" fill="#F5F5F5" stroke="#CCC" stroke-width="1" rx="4"/>
  <text x="120" y="46" text-anchor="middle" fill="#999" font-size="7">Obraz wejściowy</text>
  <!-- Sky -->
  <rect x="25" y="50" width="190" height="40" fill="#D6EAF8" rx="2"/>
  <!-- Road -->
  <rect x="25" y="90" width="190" height="65" fill="#D5D8DC" rx="2"/>
  <!-- Car 1 bounding box -->
  <rect x="35" y="82" width="55" height="40" fill="none" stroke="#E74C3C" stroke-width="2" rx="2"/>
  <rect x="35" y="74" width="55" height="10" fill="#E74C3C" rx="2"/>
  <text x="62" y="82" text-anchor="middle" fill="#FFF" font-size="6" font-weight="bold">Samochód 95%</text>
  <!-- Car shape inside -->
  <rect x="42" y="92" width="40" height="22" fill="#7FB3D8" rx="3"/>
  <!-- Car 2 bounding box -->
  <rect x="120" y="88" width="45" height="35" fill="none" stroke="#28A745" stroke-width="2" rx="2"/>
  <rect x="120" y="80" width="45" height="10" fill="#28A745" rx="2"/>
  <text x="142" y="88" text-anchor="middle" fill="#FFF" font-size="6" font-weight="bold">Samochód 87%</text>
  <rect x="126" y="96" width="32" height="18" fill="#7FB3D8" rx="3"/>
  <!-- Person bounding box -->
  <rect x="175" y="72" width="30" height="55" fill="none" stroke="#0078D4" stroke-width="2" rx="2"/>
  <rect x="175" y="64" width="30" height="10" fill="#0078D4" rx="2"/>
  <text x="190" y="72" text-anchor="middle" fill="#FFF" font-size="6" font-weight="bold">Osoba 91%</text>
  <!-- Person shape -->
  <circle cx="190" cy="82" r="6" fill="#F5B041"/>
  <rect x="186" y="89" width="8" height="20" fill="#5DADE2" rx="2"/>
  <!-- Info box -->
  <rect x="240" y="30" width="228" height="130" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="354" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Object Detection – wynik</text>
  <text x="252" y="64" fill="#333" font-size="7" font-weight="bold">Dla każdego obiektu zwraca:</text>
  <text x="252" y="78" fill="#333" font-size="7">1. Klasa (label): samochód, osoba, pies...</text>
  <text x="252" y="90" fill="#333" font-size="7">2. Confidence: 0–100% (pewność modelu)</text>
  <text x="252" y="102" fill="#333" font-size="7">3. Bounding Box: x, y, width, height</text>
  <line x1="252" y1="108" x2="456" y2="108" stroke="#DDD" stroke-width="0.5"/>
  <text x="252" y="120" fill="#0078D4" font-size="7" font-weight="bold">vs Image Classification:</text>
  <text x="252" y="132" fill="#555" font-size="7">Classification → 1 etykieta na cały obraz</text>
  <text x="252" y="144" fill="#555" font-size="7">Detection → wiele obiektów + lokalizacja każdego</text>
  <text x="252" y="156" fill="#555" font-size="7">Azure: AI Vision, Custom Vision (Object Detection)</text>
</svg>