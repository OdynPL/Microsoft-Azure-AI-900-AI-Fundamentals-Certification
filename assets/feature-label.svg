  <rect x="100" y="16" width="90" height="32" rx="3" fill="#f3f3f3" stroke="#e8e8e8"/>
  <text x="145" y="36" text-anchor="middle" font-size="9" font-weight="600" fill="#1976d2">Feature 2</text>
  <rect x="200" y="16" width="90" height="32" rx="3" fill="#f3f3f3" stroke="#e8e8e8"/>
  <text x="245" y="36" text-anchor="middle" font-size="9" font-weight="600" fill="#1976d2">Feature 3</text>
  <!-- Arrow to label -->
