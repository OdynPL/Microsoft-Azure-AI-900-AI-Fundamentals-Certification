  <!-- Opisy pod spodem -->
  <text x="45" y="58" text-anchor="middle" font-size="7.5" fill="#1976d2">cecha</text>
  <text x="145" y="58" text-anchor="middle" font-size="7.5" fill="#1976d2">cecha</text>
  <text x="245" y="58" text-anchor="middle" font-size="7.5" fill="#1976d2">cecha</text>
  <text x="365" y="58" text-anchor="middle" font-size="7.5" fill="#f57c00">etykieta</text>
  <!-- Podpis -->
  <text x="210" y="66" text-anchor="middle" font-size="7.5" fill="#8a8a8a">input (features) → output (label)</text>
