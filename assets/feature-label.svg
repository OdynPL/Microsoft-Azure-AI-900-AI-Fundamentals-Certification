<svg viewBox="0 0 420 68" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="a" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5" fill="none" stroke="#b3b3b3" stroke-width="1"/>
    </marker>
  </defs>
  <!-- Features -->
  <rect x="0" y="16" width="90" height="32" rx="3" fill="#f3f3f3" stroke="#e8e8e8"/>
