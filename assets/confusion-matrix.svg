<svg viewBox="0 0 380 168" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <text x="190" y="12" text-anchor="middle" font-size="9" font-weight="600" fill="#505050">Confusion Matrix</text>
  <text x="230" y="30" text-anchor="middle" font-size="7.5" fill="#8a8a8a">Predicted: Positive</text>
  <text x="330" y="30" text-anchor="middle" font-size="7.5" fill="#8a8a8a">Predicted: Negative</text>
  <text x="128" y="60" text-anchor="middle" font-size="7.5" fill="#8a8a8a" transform="rotate(0)">Actual: Positive</text>
  <text x="128" y="100" text-anchor="middle" font-size="7.5" fill="#8a8a8a">Actual: Negative</text>
  <rect x="180" y="38" width="100" height="34" rx="2" fill="#e6f4ea" stroke="#34a853" stroke-width="0.75"/>
  <text x="230" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#34a853">TP</text>
  <text x="230" y="67" text-anchor="middle" font-size="7" fill="#505050">True Positive</text>
  <rect x="282" y="38" width="100" height="34" rx="2" fill="#fef3e0" stroke="#e8a020" stroke-width="0.75"/>
  <text x="332" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#e8a020">FN</text>
  <text x="332" y="67" text-anchor="middle" font-size="7" fill="#505050">False Negative</text>
  <rect x="180" y="74" width="100" height="34" rx="2" fill="#fef3e0" stroke="#e8a020" stroke-width="0.75"/>
  <text x="230" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#e8a020">FP</text>
  <text x="230" y="103" text-anchor="middle" font-size="7" fill="#505050">False Positive</text>
  <rect x="282" y="74" width="100" height="34" rx="2" fill="#e6f4ea" stroke="#34a853" stroke-width="0.75"/>
  <text x="332" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#34a853">TN</text>
  <text x="332" y="103" text-anchor="middle" font-size="7" fill="#505050">True Negative</text>
  <line x1="0" y1="122" x2="380" y2="122" stroke="#e8e8e8" stroke-width="0.5"/>
  <rect x="4" y="130" width="88" height="30" rx="2" fill="#f3f3f3" stroke="#e8e8e8"/>
  <text x="48" y="143" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">Accuracy</text>
  <text x="48" y="155" text-anchor="middle" font-size="7" fill="#8a8a8a">(TP+TN)/All</text>
  <rect x="98" y="130" width="88" height="30" rx="2" fill="#f3f3f3" stroke="#e8e8e8"/>
  <text x="142" y="143" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">Precision</text>
  <text x="142" y="155" text-anchor="middle" font-size="7" fill="#8a8a8a">TP/(TP+FP)</text>
  <rect x="192" y="130" width="88" height="30" rx="2" fill="#f3f3f3" stroke="#e8e8e8"/>
  <text x="236" y="143" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">Recall</text>
  <text x="236" y="155" text-anchor="middle" font-size="7" fill="#8a8a8a">TP/(TP+FN)</text>
  <rect x="286" y="130" width="88" height="30" rx="2" fill="#f3f3f3" stroke="#e8e8e8"/>
  <text x="330" y="143" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">F1-Score</text>
  <text x="330" y="155" text-anchor="middle" font-size="7" fill="#8a8a8a">2·P·R/(P+R)</text>
</svg>