<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1c2e"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
  </defs>
  <rect width="860" height="500" fill="url(#bg)" rx="16"/>
  <text x="430" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">Confusion Matrix – Macierz Pomyłek</text>
  <text x="430" y="60" text-anchor="middle" font-size="13" fill="#90caf9">Narzędzie oceny jakości klasyfikatora binarnego</text>

  <!-- Matrix grid -->
  <!-- Header row -->
  <rect x="280" y="80" width="200" height="50" rx="0" fill="#0d47a1"/>
  <text x="380" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#white" fill-opacity="1" fill="white">Przewidziane:</text>
  <text x="380" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#64b5f6">POZYTYWNE</text>
  <rect x="480" y="80" width="200" height="50" rx="0" fill="#1565c0"/>
  <text x="580" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Przewidziane:</text>
  <text x="580" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#64b5f6">NEGATYWNE</text>

  <!-- Side labels -->
  <rect x="80" y="130" width="200" height="90" rx="0" fill="#1b5e20"/>
  <text x="180" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Rzeczywiste:</text>
  <text x="180" y="185" text-anchor="middle" font-size="13" font-weight="bold" fill="#a5d6a7">POZYTYWNE</text>

  <rect x="80" y="220" width="200" height="90" rx="0" fill="#b71c1c"/>
  <text x="180" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Rzeczywiste:</text>
  <text x="180" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#ef9a9a">NEGATYWNE</text>

  <!-- TP cell -->
  <rect x="280" y="130" width="200" height="90" fill="#1b5e20" stroke="#4caf50" stroke-width="3"/>
  <text x="380" y="162" text-anchor="middle" font-size="26" font-weight="bold" fill="#69f0ae">TP</text>
  <text x="380" y="185" text-anchor="middle" font-size="11" fill="#a5d6a7">True Positive</text>
  <text x="380" y="203" text-anchor="middle" font-size="11" fill="#c8e6c9">✅ Poprawne pozytywne</text>

  <!-- FN cell -->
  <rect x="480" y="130" width="200" height="90" fill="#4e2d00" stroke="#ff9800" stroke-width="3"/>
  <text x="580" y="162" text-anchor="middle" font-size="26" font-weight="bold" fill="#ffb74d">FN</text>
  <text x="580" y="185" text-anchor="middle" font-size="11" fill="#ffe0b2">False Negative</text>
  <text x="580" y="203" text-anchor="middle" font-size="11" fill="#ffcc80">❌ Przeoczenie (Type II)</text>

  <!-- FP cell -->
  <rect x="280" y="220" width="200" height="90" fill="#4e2d00" stroke="#ff9800" stroke-width="3"/>
  <text x="380" y="252" text-anchor="middle" font-size="26" font-weight="bold" fill="#ffb74d">FP</text>
  <text x="380" y="275" text-anchor="middle" font-size="11" fill="#ffe0b2">False Positive</text>
  <text x="380" y="293" text-anchor="middle" font-size="11" fill="#ffcc80">❌ Fałszywy alarm (Type I)</text>

  <!-- TN cell -->
  <rect x="480" y="220" width="200" height="90" fill="#1b5e20" stroke="#4caf50" stroke-width="3"/>
  <text x="580" y="252" text-anchor="middle" font-size="26" font-weight="bold" fill="#69f0ae">TN</text>
  <text x="580" y="275" text-anchor="middle" font-size="11" fill="#a5d6a7">True Negative</text>
  <text x="580" y="293" text-anchor="middle" font-size="11" fill="#c8e6c9">✅ Poprawne negatywne</text>

  <!-- Metrics derived -->
  <rect x="30" y="340" width="190" height="120" rx="10" fill="#0d2137" stroke="#1565c0" stroke-width="1.5"/>
  <text x="125" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#42a5f5">Accuracy</text>
  <text x="125" y="380" text-anchor="middle" font-size="11" fill="#90caf9">(TP + TN) / Total</text>
  <text x="125" y="400" text-anchor="middle" font-size="11" fill="#b0bec5">% poprawnych</text>
  <text x="125" y="418" text-anchor="middle" font-size="11" fill="#b0bec5">przewidywań</text>
  <text x="125" y="448" text-anchor="middle" font-size="10" fill="#ffcc80">⚠ Zła metryka przy</text>
  <text x="125" y="462" text-anchor="middle" font-size="10" fill="#ffcc80">niezbalansowanych danych</text>

  <rect x="235" y="340" width="190" height="120" rx="10" fill="#0d2137" stroke="#1565c0" stroke-width="1.5"/>
  <text x="330" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#42a5f5">Precision</text>
  <text x="330" y="380" text-anchor="middle" font-size="11" fill="#90caf9">TP / (TP + FP)</text>
  <text x="330" y="400" text-anchor="middle" font-size="11" fill="#b0bec5">Jak wiele z</text>
  <text x="330" y="415" text-anchor="middle" font-size="11" fill="#b0bec5">przewidzianych (+)</text>
  <text x="330" y="430" text-anchor="middle" font-size="11" fill="#b0bec5">jest naprawdę (+)?</text>
  <text x="330" y="452" text-anchor="middle" font-size="10" fill="#a5d6a7">✔ Ważna gdy FP kosztuje</text>

  <rect x="440" y="340" width="190" height="120" rx="10" fill="#0d2137" stroke="#1565c0" stroke-width="1.5"/>
  <text x="535" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#42a5f5">Recall (Czułość)</text>
  <text x="535" y="380" text-anchor="middle" font-size="11" fill="#90caf9">TP / (TP + FN)</text>
  <text x="535" y="400" text-anchor="middle" font-size="11" fill="#b0bec5">Jak wiele real. (+)</text>
  <text x="535" y="415" text-anchor="middle" font-size="11" fill="#b0bec5">zostało wykrytych?</text>
  <text x="535" y="430" text-anchor="middle" font-size="11" fill="#b0bec5">(Sensitivity)</text>
  <text x="535" y="452" text-anchor="middle" font-size="10" fill="#a5d6a7">✔ Ważna gdy FN kosztuje</text>

  <rect x="645" y="340" width="190" height="120" rx="10" fill="#0d2137" stroke="#1565c0" stroke-width="1.5"/>
  <text x="740" y="362" text-anchor="middle" font-size="12" font-weight="bold" fill="#42a5f5">F1-Score</text>
  <text x="740" y="380" text-anchor="middle" font-size="11" fill="#90caf9">2 × P×R / (P+R)</text>
  <text x="740" y="400" text-anchor="middle" font-size="11" fill="#b0bec5">Harmonia pomiędzy</text>
  <text x="740" y="415" text-anchor="middle" font-size="11" fill="#b0bec5">Precision i Recall</text>
  <text x="740" y="435" text-anchor="middle" font-size="10" fill="#a5d6a7">✔ Balans gdy oba</text>
  <text x="740" y="450" text-anchor="middle" font-size="10" fill="#a5d6a7">mają znaczenie</text>
</svg>
