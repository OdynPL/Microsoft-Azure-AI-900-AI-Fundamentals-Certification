<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <rect width="720" height="380" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect width="720" height="48" fill="#1e40af" rx="12"/><rect y="36" width="720" height="12" fill="#1e40af"/>
  <text x="360" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="white">Confusion Matrix – Macierz Pomyłek</text>
  <!-- Headers -->
  <text x="330" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Przewidziane: POZYTYWNE</text>
  <text x="510" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Przewidziane: NEGATYWNE</text>
  <text x="148" y="138" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Rzeczywiste: POZYTYWNE</text>
  <text x="148" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Rzeczywiste: NEGATYWNE</text>
  <!-- TP -->
  <rect x="240" y="90" width="180" height="80" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="330" y="120" text-anchor="middle" font-size="26" font-weight="800" fill="#065f46">TP</text>
  <text x="330" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">True Positive</text>
  <text x="330" y="156" text-anchor="middle" font-size="9" fill="#374151">✅ Poprawne trafienie</text>
  <!-- FN -->
  <rect x="430" y="90" width="180" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="520" y="120" text-anchor="middle" font-size="26" font-weight="800" fill="#92400e">FN</text>
  <text x="520" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">False Negative</text>
  <text x="520" y="156" text-anchor="middle" font-size="9" fill="#374151">❌ Przeoczenie</text>
  <!-- FP -->
  <rect x="240" y="180" width="180" height="80" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="330" y="210" text-anchor="middle" font-size="26" font-weight="800" fill="#92400e">FP</text>
  <text x="330" y="230" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">False Positive</text>
  <text x="330" y="246" text-anchor="middle" font-size="9" fill="#374151">❌ Fałszywy alarm</text>
  <!-- TN -->
  <rect x="430" y="180" width="180" height="80" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="520" y="210" text-anchor="middle" font-size="26" font-weight="800" fill="#065f46">TN</text>
  <text x="520" y="230" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">True Negative</text>
  <text x="520" y="246" text-anchor="middle" font-size="9" fill="#374151">✅ Poprawne odrzucenie</text>
  <!-- Metrics -->
  <rect x="16" y="282" width="165" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="98" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Accuracy</text>
  <text x="98" y="320" text-anchor="middle" font-size="10" fill="#374151">(TP+TN) / Total</text>
  <text x="98" y="348" text-anchor="middle" font-size="9" fill="#64748b">% poprawnych ogółem</text>
  <rect x="192" y="282" width="165" height="80" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="274" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">Precision</text>
  <text x="274" y="320" text-anchor="middle" font-size="10" fill="#374151">TP / (TP+FP)</text>
  <text x="274" y="348" text-anchor="middle" font-size="9" fill="#64748b">Ważna gdy FP kosztuje</text>
  <rect x="368" y="282" width="165" height="80" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="450" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Recall</text>
  <text x="450" y="320" text-anchor="middle" font-size="10" fill="#374151">TP / (TP+FN)</text>
  <text x="450" y="348" text-anchor="middle" font-size="9" fill="#64748b">Ważna gdy FN kosztuje</text>
  <rect x="544" y="282" width="160" height="80" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="624" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">F1-Score</text>
  <text x="624" y="320" text-anchor="middle" font-size="10" fill="#374151">2·P·R / (P+R)</text>
  <text x="624" y="348" text-anchor="middle" font-size="9" fill="#64748b">Balans P i R</text>
</svg>