<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">ReLU – Rectified Linear Unit</text>
  <!-- Axes -->
  <line x1="40" y1="25" x2="40" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="10" y1="95" x2="270" y2="95" stroke="#333" stroke-width="1.5"/>
  <text x="275" y="99" fill="#333" font-size="8">x</text>
  <text x="44" y="25" fill="#333" font-size="8">f(x)</text>
  <!-- Grid -->
  <line x1="10" y1="55" x2="270" y2="55" stroke="#EEE" stroke-width="0.5"/>
  <line x1="10" y1="135" x2="270" y2="135" stroke="#EEE" stroke-width="0.5"/>
  <line x1="100" y1="25" x2="100" y2="155" stroke="#EEE" stroke-width="0.5"/>
  <line x1="160" y1="25" x2="160" y2="155" stroke="#EEE" stroke-width="0.5"/>
  <line x1="220" y1="25" x2="220" y2="155" stroke="#EEE" stroke-width="0.5"/>
  <!-- ReLU function: flat at 0 for x<0, linear for x>=0 -->
  <line x1="10" y1="95" x2="40" y2="95" stroke="#0078D4" stroke-width="3"/>
  <line x1="40" y1="95" x2="220" y2="25" stroke="#0078D4" stroke-width="3"/>
  <!-- Zero point -->
  <circle cx="40" cy="95" r="4" fill="#0078D4"/>
  <text x="50" y="110" fill="#0078D4" font-size="8" font-weight="bold">0</text>
  <!-- Formula -->
  <text x="140" y="145" text-anchor="middle" fill="#0078D4" font-size="11" font-weight="bold">f(x) = max(0, x)</text>
  <!-- Labels -->
  <text x="20" y="88" text-anchor="middle" fill="#E74C3C" font-size="7">x &lt; 0: 0</text>
  <text x="160" y="50" text-anchor="middle" fill="#28A745" font-size="7">x ≥ 0: x</text>
  <!-- Info box -->
  <rect x="290" y="30" width="180" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="380" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy ReLU</text>
  <text x="300" y="64" fill="#333" font-size="8">• Najczęstsza funkcja aktywacji</text>
  <text x="300" y="77" fill="#333" font-size="8">• Szybka i prosta obliczeniowo</text>
  <text x="300" y="90" fill="#333" font-size="8">• Rozwiązuje vanishing gradient</text>
  <text x="300" y="103" fill="#333" font-size="8">• Problem: „martwe neurony"</text>
  <text x="300" y="116" fill="#333" font-size="8">• Warstwy ukryte sieci</text>
  <text x="300" y="129" fill="#333" font-size="8">• Warianty: Leaky, PReLU, ELU</text>
  <text x="300" y="142" fill="#333" font-size="8">• Gradient: 0 lub 1</text>
</svg>