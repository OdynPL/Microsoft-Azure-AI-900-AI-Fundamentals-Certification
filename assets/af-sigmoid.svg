<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Sigmoid – f(x) = 1/(1+e⁻ˣ)</text>
  <!-- Axes -->
  <line x1="140" y1="25" x2="140" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="10" y1="90" x2="270" y2="90" stroke="#333" stroke-width="1.5"/>
  <text x="275" y="94" fill="#333" font-size="8">x</text>
  <text x="144" y="25" fill="#333" font-size="8">f(x)</text>
  <!-- Grid lines -->
  <line x1="10" y1="35" x2="270" y2="35" stroke="#EEE" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="135" y="38" text-anchor="end" fill="#999" font-size="7">1.0</text>
  <line x1="10" y1="62" x2="270" y2="62" stroke="#EEE" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="135" y="66" text-anchor="end" fill="#999" font-size="7">0.5</text>
  <line x1="10" y1="145" x2="270" y2="145" stroke="#EEE" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="135" y="148" text-anchor="end" fill="#999" font-size="7">0.0</text>
  <!-- Sigmoid curve (approximated with polyline) -->
  <polyline points="10,143 30,142 50,140 70,137 90,130 110,115 125,100 140,62 155,45 170,37 190,33 210,31 230,30 250,29 270,29" fill="none" stroke="#0078D4" stroke-width="3" stroke-linecap="round"/>
  <!-- Threshold line at 0.5 -->
  <line x1="10" y1="62" x2="270" y2="62" stroke="#E74C3C" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="270" y="58" text-anchor="end" fill="#E74C3C" font-size="7">Próg 0.5</text>
  <!-- Labels -->
  <text x="50" y="125" text-anchor="middle" fill="#E74C3C" font-size="7">→ 0</text>
  <text x="230" y="45" text-anchor="middle" fill="#28A745" font-size="7">→ 1</text>
  <!-- Midpoint -->
  <circle cx="140" cy="62" r="4" fill="#0078D4"/>
  <text x="125" y="75" text-anchor="end" fill="#0078D4" font-size="7">(0, 0.5)</text>
  <!-- Info box -->
  <rect x="290" y="30" width="180" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="380" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Cechy Sigmoid</text>
  <text x="300" y="64" fill="#333" font-size="8">• Wyjście: zakres (0, 1)</text>
  <text x="300" y="77" fill="#333" font-size="8">• Klasyfikacja binarna</text>
  <text x="300" y="90" fill="#333" font-size="8">• Warstwa wyjściowa</text>
  <text x="300" y="103" fill="#333" font-size="8">• Problem: vanishing gradient</text>
  <text x="300" y="116" fill="#333" font-size="8">• Interpretacja: prawdopodobieństwo</text>
  <text x="300" y="129" fill="#333" font-size="8">• Logistic Regression = sigmoid</text>
  <text x="300" y="142" fill="#333" font-size="8">• Raczej NIE w warstwach ukrytych</text>
</svg>