<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Autocomplete Hallucination – „bo statystycznie pasuje"</text>
  <!-- Token prediction visualization -->
  <text x="130" y="38" text-anchor="middle" fill="#555" font-size="8" font-weight="bold">Predykcja kolejnego tokena</text>
  <!-- Token chain -->
  <rect x="15" y="44" width="42" height="22" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="36" y="58" text-anchor="middle" fill="#333" font-size="7">Polska</text>
  <rect x="62" y="44" width="32" height="22" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="78" y="58" text-anchor="middle" fill="#333" font-size="7">jest</text>
  <rect x="99" y="44" width="55" height="22" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="4"/>
  <text x="126" y="58" text-anchor="middle" fill="#333" font-size="7">członkiem</text>
  <!-- Next token candidates -->
  <line x1="157" y1="55" x2="172" y2="42" stroke="#28A745" stroke-width="1" marker-end="url(#arrG)"/>
  <rect x="175" y="32" width="30" height="18" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" rx="3"/>
  <text x="190" y="44" text-anchor="middle" fill="#28A745" font-size="6" font-weight="bold">UE</text>
  <text x="210" y="44" fill="#28A745" font-size="6">← 62%</text>
  <line x1="157" y1="55" x2="172" y2="55" stroke="#E6A800" stroke-width="1" marker-end="url(#arrY)"/>
  <rect x="175" y="48" width="40" height="18" fill="#FFF3CD" stroke="#E6A800" stroke-width="1" rx="3"/>
  <text x="195" y="60" text-anchor="middle" fill="#8B6A00" font-size="6">NATO</text>
  <text x="220" y="60" fill="#8B6A00" font-size="6">← 25%</text>
  <line x1="157" y1="55" x2="172" y2="68" stroke="#E74C3C" stroke-width="1" marker-end="url(#arrR)"/>
  <rect x="175" y="64" width="55" height="18" fill="#FDECEA" stroke="#E74C3C" stroke-width="1" rx="3"/>
  <text x="202" y="76" text-anchor="middle" fill="#E74C3C" font-size="6">BRICS</text>
  <text x="235" y="76" fill="#E74C3C" font-size="6">← 8%</text>
  <text x="248" y="76" fill="#E74C3C" font-size="5">(fałsz!)</text>
  <!-- Example of autocomplete error -->
  <rect x="15" y="88" width="250" height="46" fill="#FDECEA" stroke="#E74C3C" stroke-width="1" rx="6"/>
  <text x="140" y="102" text-anchor="middle" fill="#E74C3C" font-size="8" font-weight="bold">Przykład autocomplete hallucination:</text>
  <text x="25" y="116" fill="#333" font-size="7">"Einstein otrzymał Nobla z fizyki za odkrycie</text>
  <text x="25" y="128" fill="#E74C3C" font-size="7" font-weight="bold">teorii względności" ✗ (poprawnie: efekt fotoelektryczny)</text>
  <!-- Info box -->
  <rect x="280" y="88" width="188" height="46" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="374" y="102" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">Mechanizm</text>
  <text x="288" y="114" fill="#333" font-size="7">Model wybiera token o wysokim</text>
  <text x="288" y="125" fill="#333" font-size="7">p-stwie, który „brzmi dobrze"</text>
  <text x="288" y="134" fill="#555" font-size="6">– nie sprawdza prawdziwości</text>
  <!-- Solutions -->
  <rect x="15" y="140" width="452" height="30" fill="#D5F5E3" stroke="#28A745" stroke-width="1" rx="6"/>
  <text x="241" y="154" text-anchor="middle" fill="#28A745" font-size="8" font-weight="bold">Rozwiązanie: Temperature = 0 + Top-p ↓ + RAG z weryfikacją + human review</text>
  <text x="241" y="166" text-anchor="middle" fill="#555" font-size="7">Każdy token to p-stwie, nie fakt – autoregresja propaguje błędy (snowball effect)</text>
  <defs>
    <marker id="arrG" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#28A745"/></marker>
    <marker id="arrY" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#E6A800"/></marker>
    <marker id="arrR" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#E74C3C"/></marker>
  </defs>
</svg>