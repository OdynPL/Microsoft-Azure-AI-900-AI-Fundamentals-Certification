  <text x="86" y="146" text-anchor="middle" font-size="10" fill="#64748b">MS Office</text>
  <text x="86" y="166" text-anchor="middle" font-size="10" fill="#64748b">HTML</text>
  <line x1="156" y1="131" x2="186" y2="131" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
