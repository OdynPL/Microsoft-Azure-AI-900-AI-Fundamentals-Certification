<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e"/>
      <stop offset="100%" style="stop-color:#1a2c42"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64b5f6"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="url(#bg)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">Azure AI Document Intelligence</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#90caf9">Automatyczna ekstrakcja danych z dokumentów – dawniej Form Recognizer</text>

  <!-- Input documents -->
  <rect x="20" y="90" width="160" height="240" rx="12" fill="#0d47a1" stroke="#42a5f5" stroke-width="2"/>
  <text x="100" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📥 Dokumenty</text>
  <text x="100" y="138" text-anchor="middle" font-size="11" fill="#90caf9">📄 PDF</text>
  <text x="100" y="158" text-anchor="middle" font-size="11" fill="#90caf9">🖼 Obraz (JPG/PNG)</text>
  <text x="100" y="178" text-anchor="middle" font-size="11" fill="#90caf9">📊 Skany</text>
  <text x="100" y="198" text-anchor="middle" font-size="11" fill="#90caf9">📑 Tabele</text>
  <text x="100" y="218" text-anchor="middle" font-size="11" fill="#90caf9">🧾 Paragony</text>
  <text x="100" y="238" text-anchor="middle" font-size="11" fill="#90caf9">💼 Faktury</text>
  <text x="100" y="258" text-anchor="middle" font-size="11" fill="#90caf9">🪪 Dowody ID</text>
  <text x="100" y="278" text-anchor="middle" font-size="11" fill="#90caf9">💳 Karty biznes.</text>
  <text x="100" y="298" text-anchor="middle" font-size="11" fill="#90caf9">📋 Formularze</text>

  <line x1="183" y1="210" x2="220" y2="210" stroke="#64b5f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- AI Processing -->
  <rect x="220" y="90" width="200" height="240" rx="12" fill="#1a237e" stroke="#7986cb" stroke-width="2"/>
  <text x="320" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🧠 AI Processing</text>
  <text x="320" y="140" text-anchor="middle" font-size="11" fill="#c5cae9">OCR (text extraction)</text>
  <text x="320" y="160" text-anchor="middle" font-size="11" fill="#c5cae9">Layout Analysis</text>
  <text x="320" y="180" text-anchor="middle" font-size="11" fill="#c5cae9">Key-Value Pairs</text>
  <text x="320" y="200" text-anchor="middle" font-size="11" fill="#c5cae9">Table Extraction</text>
  <text x="320" y="220" text-anchor="middle" font-size="11" fill="#c5cae9">Signature Detection</text>
  <text x="320" y="255" text-anchor="middle" font-size="10" fill="#9fa8da">Pre-built + Custom Models</text>
  <text x="320" y="272" text-anchor="middle" font-size="10" fill="#9fa8da">REST API + SDK</text>
  <text x="320" y="289" text-anchor="middle" font-size="10" fill="#9fa8da">confidence scores</text>

  <line x1="422" y1="210" x2="458" y2="210" stroke="#64b5f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Pre-built models -->
  <rect x="458" y="90" width="400" height="240" rx="12" fill="#102027" stroke="#26c6da" stroke-width="2"/>
  <text x="658" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#26c6da">Gotowe modele (Pre-built)</text>

  <!-- Invoice -->
  <rect x="468" y="128" width="175" height="68" rx="8" fill="#004d40" stroke="#4db6ac" stroke-width="1.5"/>
  <text x="555" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#80cbc4">🧾 Invoice</text>
  <text x="555" y="165" text-anchor="middle" font-size="10" fill="#b2dfdb">Numer, data, kwota</text>
  <text x="555" y="180" text-anchor="middle" font-size="10" fill="#b2dfdb">VAT, dostawca, nabywca</text>

  <!-- Receipt -->
  <rect x="653" y="128" width="175" height="68" rx="8" fill="#1a3300" stroke="#8bc34a" stroke-width="1.5"/>
  <text x="740" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#aed581">🧾 Receipt</text>
  <text x="740" y="165" text-anchor="middle" font-size="10" fill="#c5e1a5">Merchant, data, suma</text>
  <text x="740" y="180" text-anchor="middle" font-size="10" fill="#c5e1a5">Pozycje, podatki</text>

  <!-- ID Document -->
  <rect x="468" y="205" width="175" height="68" rx="8" fill="#3e0000" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="555" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#ef9a9a">🪪 ID Document</text>
  <text x="555" y="242" text-anchor="middle" font-size="10" fill="#ffcdd2">Imię, nazwisko, data ur.</text>
  <text x="555" y="257" text-anchor="middle" font-size="10" fill="#ffcdd2">Paszport / Prawo jazdy</text>

  <!-- Business Card -->
  <rect x="653" y="205" width="175" height="68" rx="8" fill="#4a148c" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="740" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#ce93d8">💳 Business Card</text>
  <text x="740" y="242" text-anchor="middle" font-size="10" fill="#e1bee7">Imię, telefon, e-mail</text>
  <text x="740" y="257" text-anchor="middle" font-size="10" fill="#e1bee7">Firma, stanowisko</text>

  <!-- Output JSON -->
  <rect x="100" y="352" width="680" height="70" rx="12" fill="#1b2e1b" stroke="#66bb6a" stroke-width="2"/>
  <text x="440" y="376" text-anchor="middle" font-size="13" font-weight="bold" fill="#a5d6a7">📤 Wynik: ustrukturyzowany JSON z confidence score dla każdego pola</text>
  <text x="440" y="398" text-anchor="middle" font-size="11" fill="#81c784">{"InvoiceId": "FV/2024/01", "InvoiceDate": "2024-01-15", "TotalTax": "230.00", "confidence": 0.98}</text>
</svg>
