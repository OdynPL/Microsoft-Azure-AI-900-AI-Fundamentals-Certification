  <rect x="502" y="126" width="100" height="26" rx="6" fill="white" stroke="#059669" stroke-width="1"/>
  <text x="552" y="144" text-anchor="middle" font-size="10" fill="#374151">💳 Business Card</text>
  <rect x="396" y="158" width="100" height="26" rx="6" fill="white" stroke="#059669" stroke-width="1"/>
