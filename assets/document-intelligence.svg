  <text x="644" y="290" text-anchor="middle" font-size="10" fill="#374151">• Tabele i komórki</text>
  <text x="644" y="308" text-anchor="middle" font-size="10" fill="#374151">• Zaznaczenia (checkmarks)</text>
  <text x="644" y="326" text-anchor="middle" font-size="10" fill="#374151">• Nagłówki / Sekcje</text>
  <text x="644" y="348" text-anchor="middle" font-size="9" fill="#64748b">Relacje strukturalne</text>
</svg>