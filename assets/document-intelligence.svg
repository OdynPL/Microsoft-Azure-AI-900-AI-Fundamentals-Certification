  <text x="391" y="270" text-anchor="middle" font-size="10" fill="#374151">Ekstrakcja tekstu z dokumentów</text>
  <text x="391" y="290" text-anchor="middle" font-size="10" fill="#374151">• Drukowany i ręczny tekst</text>
  <text x="391" y="308" text-anchor="middle" font-size="10" fill="#374151">• 309 języków (druk)</text>
  <text x="391" y="326" text-anchor="middle" font-size="10" fill="#374151">• 12 języków (rękopis)</text>
  <text x="391" y="348" text-anchor="middle" font-size="9" fill="#64748b">Podstawa wszystkich modeli</text>
  <rect x="524" y="224" width="240" height="138" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="644" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Layout Model</text>
