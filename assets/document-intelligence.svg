  <text x="270" y="162" text-anchor="middle" font-size="9" fill="#64748b">OCR + AI Extraction</text>
  <line x1="348" y1="131" x2="378" y2="131" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
