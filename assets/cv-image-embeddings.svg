<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Image Embeddings – wektorowa reprezentacja obrazu</text>
  <!-- Input image -->
  <rect x="15" y="35" width="65" height="55" fill="#D6EAF8" stroke="#999" stroke-width="1" rx="4"/>
  <rect x="22" y="58" width="18" height="22" fill="#E74C3C" rx="2"/>
  <circle cx="60" cy="52" r="8" fill="#F9E79F"/>
  <text x="47" y="82" text-anchor="middle" fill="#999" font-size="6">Obraz</text>
  <!-- Arrow -->
  <line x1="85" y1="62" x2="100" y2="62" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Vision Model -->
  <rect x="105" y="40" width="70" height="45" fill="#0078D4" stroke="#005A9E" stroke-width="1.5" rx="8"/>
  <text x="140" y="58" text-anchor="middle" fill="#FFF" font-size="8" font-weight="bold">Vision</text>
  <text x="140" y="70" text-anchor="middle" fill="#D6EAF8" font-size="7">Model 4.0</text>
  <!-- Arrow -->
  <line x1="180" y1="62" x2="195" y2="62" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Embedding vector -->
  <rect x="200" y="35" width="105" height="55" fill="#FFF3CD" stroke="#E6A800" stroke-width="1.5" rx="6"/>
  <text x="252" y="50" text-anchor="middle" fill="#8B6A00" font-size="7" font-weight="bold">Embedding (1024-dim)</text>
  <text x="210" y="64" fill="#555" font-size="6">[0.12, -0.45, 0.78, 0.03,</text>
  <text x="210" y="74" fill="#555" font-size="6"> -0.91, 0.56, ..., 0.33]</text>
  <text x="252" y="86" text-anchor="middle" fill="#8B6A00" font-size="6">wektor = tożsamość obrazu</text>
  <!-- Arrow to similarity -->
  <line x1="310" y1="62" x2="325" y2="62" stroke="#28A745" stroke-width="1.5" marker-end="url(#arrG)"/>
  <!-- Similarity search -->
  <rect x="330" y="30" width="140" height="65" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" rx="6"/>
  <text x="400" y="46" text-anchor="middle" fill="#28A745" font-size="8" font-weight="bold">Similarity Search</text>
  <text x="338" y="60" fill="#333" font-size="6">cosine_sim(query, db) → ranking</text>
  <rect x="338" y="66" width="122" height="10" fill="#FFF" stroke="#28A745" stroke-width="0.5" rx="2"/>
  <text x="399" y="74" text-anchor="middle" fill="#333" font-size="6">1. Plaża z psem (0.95)</text>
  <rect x="338" y="78" width="122" height="10" fill="#FFF" stroke="#28A745" stroke-width="0.5" rx="2"/>
  <text x="399" y="86" text-anchor="middle" fill="#333" font-size="6">2. Park z drzewem (0.72)</text>
  <!-- Use case: RAG pipeline -->
  <rect x="15" y="100" width="453" height="65" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="241" y="116" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Zastosowania Image Embeddings w Azure</text>
  <text x="25" y="130" fill="#333" font-size="7">1. Visual Search – wyszukiwanie obrazów podobnych do zapytania (obraz lub tekst)</text>
  <text x="25" y="142" fill="#333" font-size="7">2. Multimodal RAG – łączenie embeddingów tekstu i obrazu w jednej przestrzeni wektorowej</text>
  <text x="25" y="154" fill="#333" font-size="7">3. Image Retrieval API (Azure Vision 4.0) – vectorize endpoint → cosine similarity → ranking</text>
  <text x="25" y="164" fill="#555" font-size="6">Modele: Florence (Microsoft) | Integracja z Azure AI Search jako vector store</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0078D4"/></marker>
    <marker id="arrG" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#28A745"/></marker>
  </defs>
</svg>