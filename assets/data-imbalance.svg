<svg viewBox="0 0 480 76" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <text x="240" y="10" text-anchor="middle" font-size="9" font-weight="600" fill="#0078d4">Data Imbalance – problem i rozwiązania</text>
  <rect x="0" y="20" width="140" height="28" rx="3" fill="#fef3e0" stroke="#e8a020" stroke-width="0.75"/>
  <text x="70" y="32" text-anchor="middle" font-size="7.5" font-weight="600" fill="#e8a020">Klasa A: 95%</text>
  <text x="70" y="42" text-anchor="middle" font-size="6.5" fill="#8a8a8a">dominująca (normalne)</text>
  <rect x="150" y="20" width="60" height="28" rx="3" fill="#fce4ec" stroke="#d32f2f" stroke-width="0.75"/>
  <text x="180" y="32" text-anchor="middle" font-size="7.5" font-weight="700" fill="#d32f2f">B: 5%</text>
  <text x="180" y="42" text-anchor="middle" font-size="6.5" fill="#8a8a8a">mniejszość</text>
  <defs><marker id="a" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5" fill="none" stroke="#b3b3b3" stroke-width="1"/></marker></defs>
  <line x1="215" y1="34" x2="227" y2="34" stroke="#b3b3b3" marker-end="url(#a)"/>
  <rect x="232" y="16" width="248" height="36" rx="3" fill="#e6f4ea" stroke="#34a853" stroke-width="0.75"/>
  <text x="356" y="29" text-anchor="middle" font-size="7.5" font-weight="600" fill="#34a853">Rozwiązania</text>
  <text x="356" y="40" text-anchor="middle" font-size="7" fill="#505050">Class Weighting · SMOTE · Oversampling · Stratified Split</text>
  <text x="356" y="50" text-anchor="middle" font-size="6.5" fill="#8a8a8a">Metryki: F1-score, Recall (nie Accuracy!)</text>
  <text x="240" y="70" text-anchor="middle" font-size="7" fill="#8a8a8a">Model z Accuracy 95% może nie złapać żadnej anomalii → użyj F1 / Recall</text>
</svg>