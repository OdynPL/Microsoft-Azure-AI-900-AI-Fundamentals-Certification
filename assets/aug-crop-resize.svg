<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Crop / Resize – wycinanie i zmiana rozmiaru</text>
  <!-- Original image -->
  <rect x="20" y="35" width="90" height="90" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5" rx="4"/>
  <text x="65" y="75" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Original</text>
  <text x="65" y="88" text-anchor="middle" fill="#0078D4" font-size="8">224×224</text>
  <!-- Crop selection box -->
  <rect x="35" y="45" width="50" height="50" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="4,2" rx="2"/>
  <text x="60" y="68" text-anchor="middle" fill="#E74C3C" font-size="7" font-weight="bold">crop</text>
  <!-- Arrow to cropped -->
  <line x1="113" y1="70" x2="135" y2="60" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Cropped image -->
  <rect x="140" y="40" width="55" height="55" fill="#FDECEA" stroke="#E74C3C" stroke-width="1.5" rx="4"/>
  <text x="167" y="65" text-anchor="middle" fill="#E74C3C" font-size="8" font-weight="bold">Crop</text>
  <text x="167" y="78" text-anchor="middle" fill="#E74C3C" font-size="7">fragment</text>
  <!-- Arrow to resized -->
  <line x1="113" y1="85" x2="135" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Resized image -->
  <rect x="140" y="105" width="40" height="40" fill="#D5F5E3" stroke="#28A745" stroke-width="1.5" rx="4"/>
  <text x="160" y="125" text-anchor="middle" fill="#28A745" font-size="7" font-weight="bold">Resize</text>
  <text x="160" y="137" text-anchor="middle" fill="#28A745" font-size="6">mniejszy</text>
  <!-- Random crop + resize combined -->
  <line x1="198" y1="67" x2="220" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="183" y1="125" x2="220" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="225" y="55" width="65" height="65" fill="#FFF3CD" stroke="#E6A800" stroke-width="1.5" rx="4"/>
  <text x="257" y="82" text-anchor="middle" fill="#8B6A00" font-size="8" font-weight="bold">Random</text>
  <text x="257" y="95" text-anchor="middle" fill="#8B6A00" font-size="8" font-weight="bold">Crop+Resize</text>
  <text x="257" y="108" text-anchor="middle" fill="#8B6A00" font-size="7">224×224</text>
  <!-- Info box -->
  <rect x="310" y="30" width="160" height="120" fill="#F0F7FF" stroke="#0078D4" stroke-width="1" rx="6"/>
  <text x="390" y="48" text-anchor="middle" fill="#0078D4" font-size="9" font-weight="bold">Techniki</text>
  <text x="320" y="64" fill="#333" font-size="8">• Random Crop: losowy fragment</text>
  <text x="320" y="77" fill="#333" font-size="8">• Center Crop: środek obrazu</text>
  <text x="320" y="90" fill="#333" font-size="8">• Resize: zmiana rozmiaru</text>
  <text x="320" y="103" fill="#333" font-size="8">• Padding: dopełnienie krawędzi</text>
  <text x="320" y="116" fill="#333" font-size="8">• Aspect ratio preservation</text>
  <text x="320" y="129" fill="#333" font-size="8">• ImageNet: 224×224 standard</text>
  <text x="320" y="142" fill="#333" font-size="8">• Uczy model na różnych skalach</text>
  <!-- Legend -->
  <text x="240" y="170" text-anchor="middle" fill="#666" font-size="8" font-style="italic">Losowe wycinanie i zmiana rozmiaru zmuszają model do nauki cech niezależnych od skali</text>
  <defs>
    <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#555"/></marker>
  </defs>
</svg>